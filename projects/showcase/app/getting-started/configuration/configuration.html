<ngwr-doc-page
  title="Configuration"
  description="Every ngwr provider in one reference. Wire what you use at bootstrap — the rest is tree-shaken away."
  [keywords]="['configuration', 'providers', 'bootstrap', 'provideWr']"
  [labels]="['Getting started']"
>
  <ngwr-doc-section
    title="Complete bootstrap"
    description="A full-featured `main.ts` showing every common ngwr provider. Delete what you don't need."
  >
    <ngwr-doc-code [code]="snippets.bootstrap" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Overlay"
    description="`provideWrOverlay()` is required for every overlay-backed component — dialog, drawer, popover, dropdown, select, tooltip, menus, pickers. Sets up an isolated overlay container so portal overlays don't leak into the app root."
  >
    <ngwr-doc-code [code]="snippets.overlay" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Icons"
    description="Pass only the icon symbols you actually use — the rest tree-shake out. Scaffold a barrel file with `ng g ngwr:icon-set`."
  >
    <ngwr-doc-code [code]="snippets.icons" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Toast"
    description="Stack of dismissible notifications. Defaults to bottom-right. Inject `WrToast` and call `open(...)` from anywhere."
  >
    <ngwr-doc-code [code]="snippets.toast" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Internationalization (i18n)"
    description="Catalog-driven translations with double-mustache interpolation, scopes, and a live locale switch. Pair `provideWrI18n` with either the static loader or `provideWrI18nHttpLoader`. See the [Internationalization primer](/getting-started/i18n) for the full story."
  >
    <ngwr-doc-code [code]="snippets.i18n" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Date adapter"
    description="Required by `wr-calendar`, `wr-date-picker` (every mode), `wr-calendar-heatmap`. Native adapter ships zero peer deps; date-fns and Luxon adapters live under separate subpaths."
  >
    <ngwr-doc-code [code]="snippets.dateAdapter" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Density"
    description="One knob for app-wide sizing. Pick a preset or supply per-axis multipliers."
  >
    <ngwr-doc-code [code]="snippets.density" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Theme"
    description="Light / dark / auto with optional `localStorage` persistence. Inject `WrTheme` to read or toggle at runtime — `theme.set('dark')`, `theme.toggle()`."
  >
    <ngwr-doc-code [code]="snippets.theme" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Loading bar"
    description="Router-aware top bar. Auto-shows on `NavigationStart`, hides on `NavigationEnd` / `Cancel`. Imperative `WrLoadingBar.start()` / `complete()` available for non-router waits."
  >
    <ngwr-doc-code [code]="snippets.loadingBar" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Cookie"
    description="SSR-safe typed cookie service. Inject `WrCookie` and call `get(name)` / `set(name, value, opts)` / `delete(name)`."
  >
    <ngwr-doc-code [code]="snippets.cookie" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Storage"
    description="Swappable engine (local / session / memory / custom) with TTL and a reactive watch signal."
  >
    <ngwr-doc-code [code]="snippets.storage" language="angular-ts" />
  </ngwr-doc-section>
</ngwr-doc-page>
