<ngwr-doc-page
  title="Input mask (ngx-mask)"
  description="ngwr does not ship a mask directive. `ngx-mask` is mature, battle-tested, and integrates cleanly with `wrInput` — install it as a peer dep and use it directly."
  [keywords]="['mask', 'input mask', 'ngx-mask', 'phone', 'credit card']"
  [labels]="['Integration']"
>
  <ngwr-doc-section title="Why no wrMask?">
    <ngwr-doc-code [code]="snippets.why" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="1. Install" description="Adds `ngx-mask` to your `package.json`.">
    <ngwr-doc-code [code]="snippets.install" language="bash" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="2. Provide the environment"
    description="Once, in your bootstrap. Pass overrides here for app-wide defaults like thousand separator."
  >
    <ngwr-doc-code [code]="snippets.bootstrap" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="3. Import the directive"
    description="Add `NgxMaskDirective` to any standalone component's `imports` array."
  >
    <ngwr-doc-code [code]="snippets.standalone" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Common masks"
    description="The directive composes transparently with `wrInput` and any of the reactive form control modes. Try the inputs below."
  >
    <ngwr-doc-snippet [code]="snippets.common">
      <form
        [formGroup]="form"
        style="display: grid; grid-template-columns: repeat(auto-fit, minmax(16rem, 1fr)); gap: 1rem"
      >
        <label style="display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.875rem">
          Phone
          <input wrInput formControlName="phone" mask="(000) 000-0000" placeholder="(555) 555-5555" />
        </label>
        <label style="display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.875rem">
          Credit card
          <input wrInput formControlName="card" mask="0000 0000 0000 0000" placeholder="4242 4242 4242 4242" />
        </label>
        <label style="display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.875rem">
          Expiry (MM/YY)
          <input wrInput formControlName="expiry" mask="00/00" placeholder="12/29" />
        </label>
        <label style="display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.875rem">
          CVC
          <input wrInput formControlName="cvc" mask="000" placeholder="123" />
        </label>
        <label style="display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.875rem">
          Date (DD/MM/YYYY)
          <input wrInput formControlName="date" mask="00/00/0000" placeholder="31/12/2026" />
        </label>
      </form>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Money / decimals"
    description="Use the `separator.2` mask token with a `prefix` and your bootstrap-time thousand-separator + decimal-marker settings."
  >
    <ngwr-doc-snippet [code]="snippets.money">
      <form [formGroup]="form">
        <label style="display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.875rem; max-width: 16rem">
          Money
          <input wrInput formControlName="money" mask="separator.2" prefix="$ " placeholder="$ 1,234.56" />
        </label>
      </form>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Composing with ngwr validators"
    description="The masked value is also the form-control value, so every `WrValidators.*` check sees the formatted input. Combine freely."
  >
    <ngwr-doc-code [code]="snippets.validators" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Further reading">
    <ngwr-doc-code [code]="snippets.docs" language="angular-ts" />
  </ngwr-doc-section>
</ngwr-doc-page>
