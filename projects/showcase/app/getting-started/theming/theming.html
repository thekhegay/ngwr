<ngwr-doc-page
  title="Theming"
  description="ngwr is themed entirely with CSS custom properties — no SCSS rebuild required for most changes. Light + dark out of the box, swappable density, palette overrides at runtime or compile time, and tree-shakable icons you register yourself."
  [keywords]="['theme', 'theming', 'dark mode', 'palette', 'icons', 'density', 'css variables']"
  [labels]="['Core']"
>
  <ngwr-doc-section
    title="Wire it up"
    description="Two providers: theme (mode + persistence) and density (spacing scale)."
  >
    <ngwr-doc-code [code]="snippets.provider" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Load the stylesheet"
    description="One umbrella for everything, or pick individual entry-points if you bundle by component."
  >
    <ngwr-doc-code [code]="snippets.styles" language="scss" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Light / dark / auto"
    description="`mode` is what the user picked. `resolved()` is what the DOM actually has — `auto` resolves through `prefers-color-scheme`. Writes `data-theme` on `<html>` and persists via WrStorage."
  >
    <ngwr-doc-snippet code="">
      <div style="display: flex; flex-direction: column; gap: 0.75rem; align-items: flex-start">
        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap">
          @for (m of modes; track m) {
            <button wr-btn type="button" [color]="mode() === m ? 'primary' : null" (click)="setMode(m)">
              {{ m }}
            </button>
          }
        </div>
        <p style="margin: 0">
          mode: <code>{{ mode() }}</code> · resolved: <code>{{ resolved() }}</code>
        </p>
      </div>
    </ngwr-doc-snippet>
    <ngwr-doc-code [code]="snippets.darkMode" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Rebrand — at compile time"
    description="Pass your hex values to the SCSS palette module before `@use 'ngwr'`. NGWR re-derives all variants (dark, darker, light, lighter, contrast)."
  >
    <ngwr-doc-code [code]="snippets.paletteScss" language="scss" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Rebrand — at runtime"
    description="Override the CSS variables on `:root` (or any subtree). Set both the base color and the `-rgb` channel — components use the channel for `rgba()` rings and tints."
  >
    <ngwr-doc-code [code]="snippets.paletteRoot" language="scss" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Design tokens"
    description="Radius, typography, motion — all CSS custom properties you can retune."
  >
    <ngwr-doc-code [code]="snippets.tokens" language="scss" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Per-component tokens"
    description="Every component also exposes its own scoped CSS variables (`--wr-btn-radius`, `--wr-tag-bg`, …). Override at the element level when you only need to nudge one widget."
  >
    <ngwr-doc-code [code]="snippets.component" language="scss" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Density"
    description="A spacing scale — compact / default / comfortable — applied via CSS-variable multipliers. Components like button, input, select, table, list automatically pick it up."
  >
    <ngwr-doc-snippet code="">
      <div style="display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-start">
        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap">
          @for (d of densities; track d) {
            <button wr-btn type="button" [color]="densityCurrent() === d ? 'primary' : null" (click)="setDensity(d)">
              {{ d }}
            </button>
          }
        </div>
        <p style="margin: 0">
          density: <code>{{ densityCurrent() }}</code>
        </p>
      </div>
    </ngwr-doc-snippet>
    <ngwr-doc-code [code]="snippets.densityScope" language="html" />
    <p style="margin: 0.5rem 0 0">See <a routerLink="/services/density">WrDensity</a> for the full API.</p>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Icons"
    description="ngwr icons are inline SVGs you register explicitly — no HTTP, no font, tree-shakable. Import the icon constants you need; unused icons never reach the bundle."
  >
    <ngwr-doc-code [code]="snippets.iconRegister" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Custom icons"
    description="Define your own with a name + raw SVG path. Same registration flow."
  >
    <ngwr-doc-code [code]="snippets.iconCustom" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Sizing and colouring icons"
    description="Colour follows `currentColor`. Size via the `size` input (number or rem string) or the `--wr-icon-size` token."
  >
    <ngwr-doc-code [code]="snippets.iconStyle" language="html" />
  </ngwr-doc-section>
</ngwr-doc-page>
