<ngwr-doc-page
  title="Installation"
  description="Install NGWR, wire it into your Angular app, and start using components."
  [keywords]="['install', 'setup', 'getting started']"
  [labels]="['Getting started']"
>
  <ngwr-doc-section
    title="Quick start"
    description="`ng add` runs the schematic that installs peer deps, wires `@use 'ngwr';` into your global styles, and prints a tailored bootstrap snippet based on the prompts you answer."
  >
    <ngwr-doc-code [code]="snippets.ngAdd" language="bash" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Manual install"
    description="If you'd rather wire things yourself, install the package + the CDK peer."
  >
    <ngwr-doc-code [code]="snippets.install" language="bash" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Bootstrap"
    description="NGWR targets Angular 22+ with standalone components and zoneless change detection. The minimal app config:"
  >
    <ngwr-doc-code [code]="snippets.appConfig" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Global styles"
    description="Import once in your global stylesheet. The umbrella entry pulls theme tokens + every component's styles. Utilities are opt-in."
  >
    <ngwr-doc-code [code]="snippets.globalStyles" language="scss" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Per-component styles"
    description="Each component also ships a standalone SCSS entry. Theme tokens are auto-imported and deduped."
  >
    <ngwr-doc-code [code]="snippets.perComponent" language="scss" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Use a component"
    description="Import the component class into the standalone component's imports array."
  >
    <ngwr-doc-code [code]="snippets.usage" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Override design tokens"
    description="Every visual is driven by --wr-* CSS variables. Override them anywhere — :root for app-wide, any subtree for scoped."
  >
    <ngwr-doc-code [code]="snippets.overrideTokens" language="scss" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Override the palette at compile time"
    description="If you'd rather change the source-of-truth colors and let NGWR regenerate every variant (contrast / dark / light / rgb), configure the SCSS module."
  >
    <ngwr-doc-code [code]="snippets.overridePalette" language="scss" />
  </ngwr-doc-section>
</ngwr-doc-page>
