<ngwr-doc-page
  title="Color Picker"
  description="HSV canvas + hue / alpha sliders + HEX / RGB / HSL inputs + optional swatches. Use `<wr-color-picker>` inline or anchor it to a button with `[wrColorPickerTrigger]`."
  [keywords]="['color', 'colour', 'picker', 'palette', 'hsv', 'hex', 'wr-color-picker']"
  [labels]="['ControlValueAccessor', 'CDK Overlay']"
>
  <ngwr-doc-section title="Installation">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Basic"
    description="Drag the canvas, hue strip, alpha strip. Switch HEX / RGB / HSL tabs. Bound through `[(ngModel)]`."
  >
    <ngwr-doc-code [code]="snippets.basic" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; gap: 1rem; align-items: flex-start">
        <wr-color-picker [(ngModel)]="basic" />
        <div style="display: flex; flex-direction: column; gap: 0.5rem; font-size: 0.8125rem">
          <span
            >Value: <code>{{ basic() }}</code></span
          >
          <span
            style="
              display: inline-block;
              width: 4rem;
              height: 4rem;
              border-radius: 0.5rem;
              border: 1px solid var(--wr-color-light);
            "
            [style.background]="basic()"
          ></span>
        </div>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="No alpha"
    description='Pass `[alpha]="false"` to hide the alpha slider and emit 6-digit hex.'
  >
    <ngwr-doc-code [code]="snippets.opaque" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-color-picker [(ngModel)]="opaque" [alpha]="false" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Swatches"
    description="Pass `[swatches]` to render a clickable row of preset colours below the inputs."
  >
    <ngwr-doc-code [code]="snippets.swatches" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-color-picker [(ngModel)]="branded" [swatches]="palette" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Popover trigger"
    description="Apply `[wrColorPickerTrigger]` to any clickable element. Opens the picker in an anchored overlay; two-way binds through `[(value)]`."
  >
    <ngwr-doc-code [code]="snippets.trigger" language="angular-html" />
    <ngwr-doc-snippet code="">
      <button
        type="button"
        wrColorPickerTrigger
        [(value)]="triggered"
        [swatches]="palette"
        style="
          display: inline-flex;
          align-items: center;
          gap: 0.5rem;
          padding: 0.5rem 0.75rem;
          background: var(--wr-color-white);
          border: 1px solid var(--wr-color-light);
          border-radius: 0.5rem;
          font: inherit;
          cursor: pointer;
        "
      >
        <span
          style="
            display: inline-block;
            width: 1.25rem;
            height: 1.25rem;
            border-radius: 0.25rem;
            border: 1px solid rgba(0, 0, 0, 0.1);
          "
          [style.background]="triggered()"
        ></span>
        {{ triggered() }}
      </button>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Color utilities"
    description="Pure functions exported alongside the component. Useful when you need parsing / format conversion without rendering a picker."
  >
    <ngwr-doc-code [code]="snippets.utils" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="<wr-color-picker>">
    <ngwr-doc-api [rows]="pickerApi" />
  </ngwr-doc-section>

  <ngwr-doc-section title="[wrColorPickerTrigger]">
    <ngwr-doc-api [rows]="triggerApi" />
  </ngwr-doc-section>

  <ngwr-doc-section title="[wrColorPickerTrigger] events">
    <ngwr-doc-api [rows]="triggerEvents" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Exported utilities">
    <ngwr-doc-api [rows]="utilsApi" />
  </ngwr-doc-section>
</ngwr-doc-page>
