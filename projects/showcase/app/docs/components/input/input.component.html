<ngwr-doc-page
  title="Input"
  description="Single-line text input. Implements ControlValueAccessor."
  [keywords]="['input', 'wr-input', 'text']"
  [labels]="['Component', 'Standalone']"
>
  <ngwr-doc-section title="Installation">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Basic usage">
    <ngwr-doc-snippet [code]="snippets.basic">
      <wr-input placeholder="Type here…" [(ngModel)]="text" />
      <span style="color: var(--wr-color-medium); font-size: 0.875rem">Value: {{ text() }}</span>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Types">
    <ngwr-doc-snippet [code]="snippets.types">
      <wr-input type="email" placeholder="you@example.com" />
      <wr-input type="number" placeholder="0" />
      <wr-input type="search" placeholder="Search" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Prefix & suffix">
    <ngwr-doc-snippet [code]="snippets.affixes">
      <wr-input prefix="$" suffix="USD" type="number" placeholder="0" />
      <wr-input prefix="https://" placeholder="example.com" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Rounded">
    <ngwr-doc-snippet [code]="snippets.rounded">
      <wr-input placeholder="Rounded" rounded />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Password" description="The eye toggle is only rendered when type='password'.">
    <ngwr-doc-snippet [code]="snippets.password">
      <wr-input type="password" placeholder="Password" passwordToggle [(ngModel)]="password" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Disabled">
    <ngwr-doc-snippet [code]="snippets.disabled">
      <wr-input placeholder="Disabled" disabled />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
