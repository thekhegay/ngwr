<ngwr-doc-page
  title="Charts"
  description="Minimal SVG chart primitives — no external dependencies. Sparkline, gauge, bar, donut, line (with hover tooltip), and a year-grid calendar heatmap."
  [keywords]="['charts', 'sparkline', 'gauge', 'bar-chart', 'donut-chart', 'line-chart', 'calendar-heatmap']"
  [labels]="['Composite']"
>
  <ngwr-doc-section title="Sparkline" description="Tiny inline trend line — no axes.">
    <ngwr-doc-code [code]="snippets.sparkline" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; align-items: center; gap: 1.5rem">
        <wr-sparkline [data]="sparklineData" width="10rem" height="2.5rem" />
        <wr-sparkline
          [data]="sparklineData"
          [showArea]="true"
          color="var(--wr-color-success)"
          width="10rem"
          height="2.5rem"
        />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Gauge" description="Semicircle progress — display-only.">
    <ngwr-doc-code [code]="snippets.gauge" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; gap: 2rem; flex-wrap: wrap; align-items: center">
        <wr-gauge [value]="72" suffix="%" />
        <wr-gauge [value]="9.5" [min]="0" [max]="10" suffix="/10" valueColor="var(--wr-color-warning)" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Bar chart" description="Vertical bars, one series.">
    <ngwr-doc-code [code]="snippets.bar" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="max-width: 28rem">
        <wr-bar-chart [data]="bars" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Donut chart" description='Set `thickness="0"` for a solid pie.'>
    <ngwr-doc-code [code]="snippets.donut" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-donut-chart [segments]="donutSegments" centerLabel="Disk" centerValue="60%" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Line chart" description="Multi-series with hover tooltip.">
    <ngwr-doc-code [code]="snippets.line" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="max-width: 36rem">
        <wr-line-chart [series]="lineSeries" [xLabels]="xLabels" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Calendar heatmap" description="GitHub-style year grid.">
    <ngwr-doc-code [code]="snippets.heatmap" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-calendar-heatmap [data]="heatmap" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>
</ngwr-doc-page>
