<ngwr-doc-page
  title="Number Input"
  description="Numeric input with locale-aware formatting and ▲▼ stepper buttons. Value is `number | null`. Parses leniently while typing, re-formats with grouping + fixed decimals on blur."
  [keywords]="['number', 'input', 'stepper', 'numeric', 'wr-number-input']"
  [labels]="['ControlValueAccessor']"
>
  <ngwr-doc-section title="Installation">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Basic" description="Locale comes from Angular's `LOCALE_ID`.">
    <ngwr-doc-code [code]="snippets.basic" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-number-input [(ngModel)]="basic" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Min / max / step"
    description="Clamps the value to the range. Arrow keys bump by `step`, Shift+Arrow bumps by `10 × step`."
  >
    <ngwr-doc-code [code]="snippets.bounded" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-number-input [(ngModel)]="bounded" [min]="0" [max]="100" [step]="5" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Prefix and decimals" description="Fix the number of decimals shown on blur.">
    <ngwr-doc-code [code]="snippets.price" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-number-input [(ngModel)]="price" prefix="$" [decimals]="2" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Suffix and fractional step">
    <ngwr-doc-code [code]="snippets.weight" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-number-input [(ngModel)]="weight" suffix="kg" [decimals]="1" [step]="0.1" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Without steppers" description="Hide the ▲▼ column for a plain numeric input.">
    <ngwr-doc-code [code]="snippets.noSteppers" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-number-input [(ngModel)]="noSteppers" [showSteppers]="false" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
