<ngwr-doc-page
  title="Tooltip"
  description="Attach a small text tooltip to any element via the wrTooltip directive. Shown on hover or focus."
  [keywords]="['tooltip', 'wr-tooltip', 'overlay']"
  [labels]="['Directive', 'CDK Overlay']"
>
  <ngwr-doc-section title="Installation">
    <ngwr-doc-code [code]="snippets.install" language="typescript" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Basic usage">
    <ngwr-doc-snippet [code]="snippets.basic">
      <wr-btn [wrTooltip]="'Save changes'">Save</wr-btn>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Positions">
    <ngwr-doc-snippet [code]="snippets.positions">
      <wr-btn [wrTooltip]="'Above'" position="top">Top</wr-btn>
      <wr-btn [wrTooltip]="'Below'" position="bottom">Bottom</wr-btn>
      <wr-btn [wrTooltip]="'Left of trigger'" position="left">Left</wr-btn>
      <wr-btn [wrTooltip]="'Right of trigger'" position="right">Right</wr-btn>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Custom delays">
    <ngwr-doc-snippet [code]="snippets.delays">
      <wr-btn [wrTooltip]="'Instant'" [showDelay]="0" [hideDelay]="0">Instant</wr-btn>
      <wr-btn [wrTooltip]="'Slow'" [showDelay]="800" [hideDelay]="400">Slow</wr-btn>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
