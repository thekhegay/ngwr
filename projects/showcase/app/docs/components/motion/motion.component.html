<ngwr-doc-page
  title="Motion"
  description="Decorative effects — animated text, count-up, marquee, tilt, spotlight, shimmer, aurora background, confetti."
  [keywords]="[
    'motion',
    'animation',
    'wr-animated-text',
    'wr-count-up',
    'wr-marquee',
    'wrTilt',
    'wrSpotlight',
    'wrShimmer',
    'wr-aurora',
    'wr-confetti',
  ]"
  [labels]="['Composite']"
>
  <ngwr-doc-section title="Animated text" description="Typewriter, scramble, or split-letter reveal.">
    <ngwr-doc-code [code]="snippets.animatedText" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; flex-direction: column; gap: 0.5rem; font-size: 1.5rem; font-weight: 600">
        <span wr-animated-text [text]="'Welcome aboard'" mode="typewriter"></span>
        <span wr-animated-text [text]="'Decoded message'" mode="scramble"></span>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Count up" description="Animated number tick with `Intl.NumberFormat` formatting.">
    <ngwr-doc-code [code]="snippets.countUp" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; align-items: center; gap: 1rem; font-size: 2rem; font-weight: 700">
        <wr-count-up [to]="countTo()" />
        <button type="button" style="font-size: 0.875rem; padding: 0.25rem 0.625rem" (click)="reroll()">Reroll</button>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Shimmer text" description="Gradient sweep over text — opt-in via `wrShimmer`.">
    <ngwr-doc-code [code]="snippets.shimmer" language="angular-html" />
    <ngwr-doc-snippet code="">
      <h1 wrShimmer style="font-size: 2.5rem; margin: 0">Premium tier</h1>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Spotlight"
    description="Cursor-follow radial gradient via `[wrSpotlight]` + a custom-property CSS hook."
  >
    <ngwr-doc-code [code]="snippets.spotlight" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div
        wrSpotlight
        style="
          height: 10rem;
          border-radius: 0.75rem;
          border: 1px solid var(--wr-color-light);
          background:
            radial-gradient(
              400px circle at var(--wr-spotlight-x, 50%) var(--wr-spotlight-y, 50%),
              rgba(var(--wr-color-primary-rgb), 0.18),
              transparent 60%
            ),
            var(--wr-color-white);
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: 600;
          color: var(--wr-color-medium);
        "
      >
        Move your cursor across me
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Tilt card" description="3D mouse-tilt via `[wrTilt]`. Optional `[glare]` overlay.">
    <ngwr-doc-code [code]="snippets.tilt" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; gap: 1.5rem; justify-content: center; padding: 1rem">
        <div
          wrTilt
          [glare]="true"
          style="
            width: 12rem;
            height: 16rem;
            border-radius: 1rem;
            background: linear-gradient(135deg, var(--wr-color-primary), var(--wr-color-secondary));
            color: white;
            padding: 1.25rem;
            font-weight: 600;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
          "
        >
          Hover me
        </div>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Marquee" description="Infinite scrolling row. Content is duplicated for a seamless loop.">
    <ngwr-doc-code [code]="snippets.marquee" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-marquee speed="22">
        @for (logo of logos; track logo) {
          <span
            style="
              padding: 0.5rem 1.25rem;
              border: 1px solid var(--wr-color-light);
              border-radius: 0.5rem;
              font-weight: 600;
              color: var(--wr-color-medium);
            "
            >{{ logo }}</span
          >
        }
      </wr-marquee>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Aurora background"
    description="Animated multi-layer gradient. Drop inside any positioned container."
  >
    <ngwr-doc-code [code]="snippets.aurora" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div
        style="
          position: relative;
          height: 18rem;
          border-radius: 1rem;
          overflow: hidden;
          background: var(--wr-color-dark);
          color: var(--wr-color-white);
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        <wr-aurora />
        <h2 style="position: relative; margin: 0; font-size: 2.5rem; letter-spacing: -0.02em">Welcome aboard</h2>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Confetti" description="Imperative burst via `WrConfettiService`.">
    <ngwr-doc-code [code]="snippets.confetti" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <button
        type="button"
        style="
          padding: 0.5rem 1rem;
          border-radius: 0.5rem;
          border: 0;
          background: var(--wr-color-primary);
          color: var(--wr-color-primary-contrast, var(--wr-color-white));
          font-weight: 600;
          cursor: pointer;
        "
        (click)="fireConfetti()"
      >
        🎉 Fire confetti
      </button>
    </ngwr-doc-snippet>
  </ngwr-doc-section>
</ngwr-doc-page>
