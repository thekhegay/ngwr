<ngwr-doc-page
  title="Result"
  description="Large-illustration result / empty-state. Built-in statuses: success / warning / error / info / empty."
  [keywords]="['result', 'empty', 'wr-result']"
>
  <ngwr-doc-section title="Statuses">
    <ngwr-doc-code [code]="snippet" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(16rem, 1fr)); gap: 1rem">
        <wr-result status="success" title="Submitted" />
        <wr-result status="warning" title="Heads up" />
        <wr-result status="error" title="Failed" />
        <wr-result status="empty" title="No projects" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>
</ngwr-doc-page>
