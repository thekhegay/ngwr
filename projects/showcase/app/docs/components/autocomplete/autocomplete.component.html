<ngwr-doc-page
  title="Autocomplete"
  description="Generic combobox — typed input with a filtered list of options in an overlay. Value type is `T | null`. Use `displayWith` to render arbitrary item shapes."
  [keywords]="['autocomplete', 'combobox', 'typeahead', 'wr-autocomplete']"
  [labels]="['ControlValueAccessor', 'Generic']"
>
  <ngwr-doc-section title="Installation">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Basic" description="String options with default `includes` filter.">
    <ngwr-doc-code [code]="snippets.basic" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-autocomplete [options]="countries" [(ngModel)]="basic" placeholder="Search countries" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Object options"
    description="Provide a `displayWith` function to label arbitrary item shapes."
  >
    <ngwr-doc-code [code]="snippets.objects" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <wr-autocomplete
        [options]="users"
        [displayWith]="userLabel"
        [(ngModel)]="objectValue"
        placeholder="Search users"
      />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Free text"
    description="`freeText` lets the value escape the options list — the raw string is emitted on every keystroke."
  >
    <ngwr-doc-code [code]="snippets.freeText" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-autocomplete [options]="countries" [(ngModel)]="freeText" [freeText]="true" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Min characters" description="Panel only opens after `minChars` characters are typed.">
    <ngwr-doc-code [code]="snippets.minChars" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-autocomplete [options]="countries" [(ngModel)]="minChars" [minChars]="2" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Async loader"
    description="`asyncOptions` accepts an Observable, Promise or array. Calls are debounced; in-flight requests are auto-cancelled when a new keystroke arrives. Spinner shows while loading."
  >
    <ngwr-doc-code [code]="snippets.async" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <wr-autocomplete
        [asyncOptions]="searchCountries"
        [(ngModel)]="asyncValue"
        [debounceMs]="300"
        [minChars]="1"
        placeholder="Search countries (simulated 400ms latency)"
      />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Virtual scroll"
    description="For large option lists. Uses CDK's `cdk-virtual-scroll-viewport` — only the visible rows live in the DOM, so 5 000 items render as cheaply as 10."
  >
    <ngwr-doc-code [code]="snippets.virtual" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-autocomplete
        [options]="largeList"
        [(ngModel)]="virtualValue"
        [virtualScroll]="true"
        [itemSize]="32"
        placeholder="Search 5 000 items"
      />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
