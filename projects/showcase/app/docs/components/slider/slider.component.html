<ngwr-doc-page
  title="Slider"
  description="Drag-to-pick numeric input. Single-thumb by default, optional dual-thumb range mode. Implements `ControlValueAccessor` so it plays nicely with template-driven and reactive forms."
  [keywords]="['slider', 'range', 'wr-slider']"
  [labels]="['ControlValueAccessor', 'a11y']"
>
  <ngwr-doc-section title="Installation">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Single value" description="The default. Bind a `number` through any form mechanism.">
    <ngwr-doc-code [code]="snippets.single" language="angular-html" />
    <ngwr-doc-snippet code="<wr-slider [(ngModel)]='volume' min='0' max='100' />">
      <wr-slider [(ngModel)]="volume" min="0" max="100" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Range" description="Set `range` to render two thumbs. The bound value is `[low, high]`.">
    <ngwr-doc-code [code]="snippets.range" language="angular-html" />
    <ngwr-doc-snippet code="<wr-slider [(ngModel)]='priceRange' range min='0' max='1000' step='50' />">
      <wr-slider [(ngModel)]="priceRange" range min="0" max="1000" step="50" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Step" description="The thumb snaps to the nearest multiple of `step`.">
    <ngwr-doc-snippet code="<wr-slider [(ngModel)]='stepped' min='0' max='100' step='25' />">
      <wr-slider [(ngModel)]="stepped" min="0" max="100" step="25" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Disabled">
    <ngwr-doc-snippet code="<wr-slider [(ngModel)]='volume' disabled />">
      <wr-slider [(ngModel)]="volume" disabled />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Keyboard"
    description="The thumb is a real `<button>` with `role='slider'` — full keyboard support out of the box. Arrow keys step by `step`; Shift + arrow or PageUp / PageDown step by `step × 10`; Home / End jump to min / max."
  ></ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
