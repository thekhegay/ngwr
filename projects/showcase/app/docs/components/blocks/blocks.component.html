<ngwr-doc-page
  title="Blocks"
  description="Paste-ready marketing-page sections — Hero, Features, Pricing, CTA, 404. Each composes existing primitives so it follows your theme automatically."
  [keywords]="['blocks', 'hero', 'pricing', 'cta', '404']"
  [labels]="['Composite']"
>
  <ngwr-doc-section title="Hero">
    <ngwr-doc-code [code]="snippets.hero" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-block-hero title="Ship Angular apps faster" subtitle="ngwr is a standalone, signals-first UI library.">
        <span wrHeroBadge>v2.0 released</span>
        <div wrHeroActions>
          <button
            style="
              padding: 0.5rem 1rem;
              border-radius: 0.5rem;
              background: var(--wr-color-primary);
              color: white;
              border: 0;
            "
          >
            Get started
          </button>
          <button
            style="
              padding: 0.5rem 1rem;
              border-radius: 0.5rem;
              border: 1px solid var(--wr-color-light);
              background: transparent;
            "
          >
            Read docs
          </button>
        </div>
      </wr-block-hero>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Features">
    <ngwr-doc-code [code]="snippets.features" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-block-features title="Why pick ngwr" [features]="features" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Pricing">
    <ngwr-doc-code [code]="snippets.pricing" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-block-pricing title="Simple pricing" subtitle="No hidden fees." [tiers]="tiers" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Call to action">
    <ngwr-doc-code [code]="snippets.cta" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-block-cta title="Ready to ship?" subtitle="Start building with ngwr today.">
        <button
          wrCtaActions
          style="
            padding: 0.625rem 1.25rem;
            border-radius: 0.5rem;
            background: white;
            color: var(--wr-color-primary);
            border: 0;
            font-weight: 600;
          "
        >
          Get started
        </button>
      </wr-block-cta>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="404 / Not found">
    <ngwr-doc-code [code]="snippets.notFound" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-block-not-found>
        <a
          wrNotFoundActions
          href="#"
          style="
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            background: var(--wr-color-primary);
            color: white;
            text-decoration: none;
          "
          >Back home</a
        >
      </wr-block-not-found>
    </ngwr-doc-snippet>
  </ngwr-doc-section>
</ngwr-doc-page>
