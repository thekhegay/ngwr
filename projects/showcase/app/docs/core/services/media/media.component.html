<ngwr-doc-page
  title="WrMediaService"
  description="Signal-backed viewport queries. Named breakpoints mirror `_breakpoints.scss`; raw matchMedia strings work too."
  [keywords]="['service', 'media', 'breakpoint', 'WrMediaService']"
  [labels]="['Service']"
>
  <ngwr-doc-section title="Install">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Usage">
    <ngwr-doc-code [code]="snippets.usage" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <div style="font-family: var(--wr-font-family-base); font-size: 0.875rem; line-height: 1.5">
        <div>
          Current breakpoint: <strong>{{ currentBreakpoint() }}</strong>
        </div>
        <div>
          matches('md'): <strong>{{ isMd() }}</strong>
        </div>
        <div>
          matches('lg'): <strong>{{ isLg() }}</strong>
        </div>
        <small style="color: var(--wr-color-medium)">Resize the window — values update live.</small>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
