<ngwr-doc-page
  title="WrTheme"
  description="Light / dark theme manager. Writes `[data-theme]` on `<html>`, persists the chosen mode to localStorage. `auto` mode follows `WrPlatform.prefersDark`."
  [keywords]="['service', 'theme', 'dark mode', 'WrTheme']"
  [labels]="['Service']"
>
  <ngwr-doc-section title="Install">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Usage">
    <ngwr-doc-code [code]="snippets.usage" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <div style="font-family: var(--wr-font-family-base); font-size: 0.875rem; line-height: 1.5">
        <div>
          Mode: <strong>{{ themeService.mode() }}</strong> · Resolved:
          <strong>{{ themeService.resolved() }}</strong>
        </div>
        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem">
          <button type="button" (click)="setTheme('light')">light</button>
          <button type="button" (click)="setTheme('dark')">dark</button>
          <button type="button" (click)="setTheme('auto')">auto</button>
        </div>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
