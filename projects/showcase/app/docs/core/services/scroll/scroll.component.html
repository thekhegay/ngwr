<ngwr-doc-page
  title="WrScrollService"
  description="Smooth-scroll utility. Resolves elements / ids / selectors / coords; subtracts an `offset` for sticky headers; auto-falls back to instant scrolling when the user has `prefers-reduced-motion: reduce`."
  [keywords]="['service', 'scroll', 'WrScrollService']"
  [labels]="['Service']"
>
  <ngwr-doc-section title="Usage">
    <ngwr-doc-code [code]="snippets.usage" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <button
        type="button"
        style="
          padding: 0.4rem 0.875rem;
          border-radius: 0.375rem;
          border: 1px solid var(--wr-color-light);
          background: var(--wr-color-white);
          cursor: pointer;
        "
        (click)="scrollToTop()"
      >
        Scroll page to top (offset 80)
      </button>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
