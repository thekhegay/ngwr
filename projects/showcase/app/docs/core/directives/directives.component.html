<ngwr-doc-page
  title="Directives"
  description="Small behavioral / visual directives that compose with any host element."
  [keywords]="[
    'directives',
    'wrAutofocus',
    'wrAutosize',
    'wrBorderGlow',
    'wrClickOutside',
    'wrCopyToClipboard',
    'wrReveal',
    'wrShimmer',
    'wrSpotlight',
    'wrTilt',
  ]"
  [labels]="['Core']"
>
  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="wrAutofocus"
    description="Moves DOM focus to the host on init. Bind a boolean to focus reactively whenever the expression becomes truthy."
  >
    <ngwr-doc-code [code]="snippets.autofocus" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap">
        <button
          type="button"
          (click)="toggleAutofocus()"
          style="padding: 0.4rem 0.875rem; border: 1px solid var(--wr-color-light); border-radius: 0.375rem; background: var(--wr-color-white); cursor: pointer;"
        >
          Toggle focus
        </button>
        <input
          [wrAutofocus]="autofocusOn()"
          placeholder="I focus when toggled on"
          style="padding: 0.4rem 0.75rem; border: 1px solid var(--wr-color-light); border-radius: 0.375rem;"
        />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="wrAutosize"
    description="Auto-grow a `<textarea>` between `minRows` and `maxRows` based on its scroll height. Composes natively with `[(ngModel)]`, `[formControl]`, validators, and third-party input directives."
  >
    <ngwr-doc-code [code]="snippets.autosize" language="angular-html" />
    <ngwr-doc-snippet code="">
      <textarea
        wrAutosize
        minRows="2"
        maxRows="8"
        style="
          width: 100%;
          padding: 0.5rem;
          border: 1px solid var(--wr-color-light);
          border-radius: 0.375rem;
          font-family: inherit;
        "
        [(ngModel)]="textareaValue"
      ></textarea>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="wrBorderGlow"
    description="Rotating conic-gradient border. Tune speed in seconds via `[speed]` and the ring thickness via `[thickness]` (pixels). Requires `@use 'ngwr/animations';` for the keyframes."
  >
    <ngwr-doc-code [code]="snippets.borderGlow" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div
        wrBorderGlow
        [speed]="8"
        [thickness]="2"
        style="
          display: inline-flex;
          align-items: center;
          padding: 1rem 1.5rem;
          background: var(--wr-color-dark);
          color: var(--wr-color-white);
          border-radius: 0.75rem;
          font-weight: 600;
        "
      >
        Animated border
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="wrClickOutside"
    description="Emits when a mousedown lands outside the host. Useful for dismissing inline popovers / inline edit fields."
  >
    <ngwr-doc-code [code]="snippets.clickOutside" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div
        style="display: inline-block; padding: 0.75rem 1rem; background: rgba(0, 0, 0, 0.04); border-radius: 0.375rem"
        (wrClickOutside)="onOutside()"
      >
        Click outside this box (count: {{ outside() }})
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="wrCopyToClipboard"
    description="Copies the bound string on host click. Emits `(copied)` on success and `(copyFailed)` if the Clipboard API is unavailable."
  >
    <ngwr-doc-code [code]="snippets.clipboard" language="angular-html" />
    <ngwr-doc-snippet code="">
      <button
        type="button"
        style="
          padding: 0.4rem 0.875rem;
          border-radius: 0.375rem;
          border: 1px solid var(--wr-color-light);
          background: var(--wr-color-white);
          cursor: pointer;
        "
        [wrCopyToClipboard]="clipboardText()"
        (copied)="onCopied($event)"
      >
        Copy "{{ clipboardText() }}"
      </button>
      @if (copied()) {
        <small style="display: block; margin-top: 0.5rem; color: var(--wr-color-medium)">
          Last copied: {{ copied() }}
        </small>
      }
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="wrReveal"
    description="IntersectionObserver-driven enter animation. Adds `.wr-reveal--visible` once the host crosses the viewport threshold. Pair with `@use 'ngwr/animations';` for the default fade-and-slide-up styles."
  >
    <ngwr-doc-code [code]="snippets.reveal" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div
        style="display: flex; flex-direction: column; gap: 1rem; max-height: 14rem; overflow-y: auto; padding: 0.5rem"
      >
        <p>Scroll inside this box to trigger the reveal below.</p>
        <div style="height: 12rem"></div>
        <div
          wrReveal
          style="
            padding: 1rem;
            background: rgba(var(--wr-color-primary-rgb), 0.08);
            border: 1px solid var(--wr-color-primary);
            border-radius: 0.5rem;
            color: var(--wr-color-primary);
            font-weight: 600;
          "
        >
          Hello! I faded in.
        </div>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="wrShimmer"
    description="Sweeping highlight across text — great for premium / loading-state labels. Requires `@use 'ngwr/animations';` for the keyframes."
  >
    <ngwr-doc-code [code]="snippets.shimmer" language="angular-html" />
    <ngwr-doc-snippet code="">
      <h2 wrShimmer style="margin: 0; font-size: 2rem; font-weight: 700">Premium</h2>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="wrSpotlight"
    description="Cursor-following radial highlight. Gives flat cards a sense of interactive depth on hover."
  >
    <ngwr-doc-code [code]="snippets.spotlight" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div
        wrSpotlight
        style="
          padding: 2rem;
          background: var(--wr-color-dark);
          color: var(--wr-color-white);
          border-radius: 0.75rem;
          font-weight: 600;
          text-align: center;
        "
      >
        Hover me — the cursor leaves a soft halo.
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="wrTilt"
    description="Cursor-tracked 3D tilt for cards, hero images, anything that benefits from parallax-style feedback. `[maxTilt]` (degrees) and `[scale]` adjust the intensity."
  >
    <ngwr-doc-code [code]="snippets.tilt" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div
        wrTilt
        [maxTilt]="10"
        [scale]="1.04"
        style="
          padding: 2rem;
          background: linear-gradient(135deg, var(--wr-color-primary), var(--wr-color-secondary, var(--wr-color-primary)));
          color: var(--wr-color-white);
          border-radius: 0.75rem;
          font-weight: 600;
          text-align: center;
          will-change: transform;
        "
      >
        Move the cursor across me.
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
