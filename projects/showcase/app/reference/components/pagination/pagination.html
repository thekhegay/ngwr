<ngwr-doc-page
  title="Pagination"
  description="Numbered page navigator. Two-way binds currentPage and pageSize via signal models."
  [keywords]="['pagination', 'wr-pagination']"
  [labels]="['Component', 'Standalone']"
>
  <ngwr-doc-section title="Installation">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Basic usage">
    <ngwr-doc-snippet [code]="snippets.basic">
      <div style="width: 100%">
        <wr-pagination [total]="120" [(currentPage)]="page" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Sizes" description="Three steps — `sm` / `md` / `lg`.">
    <ngwr-doc-snippet [code]="snippets.sizes">
      <div style="width: 100%; display: flex; flex-direction: column; gap: 1rem">
        <wr-pagination [total]="120" [(currentPage)]="page" size="sm" />
        <wr-pagination [total]="120" [(currentPage)]="page" size="md" />
        <wr-pagination [total]="120" [(currentPage)]="page" size="lg" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Shape"
    description="`square` flattens cell corners for a tighter numeric grid (e.g. inside a data table)."
  >
    <ngwr-doc-snippet [code]="snippets.shapes">
      <div style="width: 100%; display: flex; flex-direction: column; gap: 1rem">
        <wr-pagination [total]="120" [(currentPage)]="page" shape="rounded" />
        <wr-pagination [total]="120" [(currentPage)]="page" shape="square" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="With total + size changer"
    description="Combine showTotal and showSizeChanger for full controls. align='end' pushes to the right."
  >
    <ngwr-doc-snippet [code]="snippets.full">
      <div style="width: 100%">
        <wr-pagination [total]="320" [(currentPage)]="page" [(pageSize)]="size" showTotal showSizeChanger align="end" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Narrow container (container query)"
    description="With `responsive`, the numbered strip collapses to a compact `‹ page / total ›` pager when the control's own box is too narrow — a container query on its own width, not the viewport. The box below is fixed at 260px."
  >
    <ngwr-doc-snippet
      code='<div style="width: 260px"><wr-pagination responsive [total]="120" [(currentPage)]="page" /></div>'
    >
      <div style="width: 260px; max-width: 100%">
        <wr-pagination responsive [total]="120" [(currentPage)]="page" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
