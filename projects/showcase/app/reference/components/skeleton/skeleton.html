<ngwr-doc-page
  title="Skeleton"
  description="Placeholder block shown while content is loading. Default height matches the surrounding line height (1lh)."
  [keywords]="['skeleton', 'loading', 'placeholder', 'wr-skeleton']"
  [labels]="['Component', 'Standalone']"
>
  <ngwr-doc-section title="Installation">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Basic usage">
    <ngwr-doc-snippet [code]="snippets.basic">
      <div style="width: 100%; display: flex; flex-direction: column; gap: 0.5rem">
        <wr-skeleton />
        <wr-skeleton />
        <wr-skeleton />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Colors">
    <ngwr-doc-snippet [code]="snippets.colors">
      <div style="width: 100%; display: flex; flex-direction: column; gap: 0.5rem">
        @for (c of colors; track c) {
          <wr-skeleton [color]="c" />
        }
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Custom shape"
    description="Override --wr-skeleton-height and --wr-skeleton-radius for blocks, cards, avatars, etc."
  >
    <ngwr-doc-snippet [code]="snippets.custom">
      <div style="width: 100%; display: flex; gap: 0.75rem; align-items: center">
        <wr-skeleton style="--wr-skeleton-height: 3rem; --wr-skeleton-radius: 50%; width: 3rem; flex: 0 0 3rem" />
        <wr-skeleton style="--wr-skeleton-height: 4rem; --wr-skeleton-radius: 1rem" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Static" description="Disable the shimmer animation.">
    <ngwr-doc-snippet [code]="snippets.static">
      <div style="width: 100%"><wr-skeleton [animated]="false" /></div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
