<ngwr-doc-page
  title="Pull to Refresh"
  description="Drag down from the top of a scrollable area to trigger a refresh — a touch gesture that lives beside native scrolling."
  [keywords]="['pull-to-refresh', 'pull to refresh', 'refresh', 'mobile', 'gesture']"
  [labels]="['Component']"
>
  <ngwr-doc-section
    title="Basic"
    description="Pull down from the very top on a touch device and release past the threshold to fire `refresh`; a light haptic tap marks the arming point. It's a controlled spinner — bind `refreshing` and clear it when the work settles. No touch device handy? The button drives the same `refreshing` state programmatically."
  >
    <ngwr-doc-code [code]="htmlSnippet" language="angular-html" />
    <ngwr-doc-code [code]="tsSnippet" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <div style="max-width: 22rem">
        <div style="display: flex; justify-content: flex-end; margin-bottom: 0.5rem">
          <wr-btn size="sm" [disabled]="loading()" (click)="reload()">Refresh programmatically</wr-btn>
        </div>
        <wr-pull-to-refresh
          style="height: 16rem; border: 1px solid var(--wr-color-outline); border-radius: var(--wr-border-radius-base)"
          [refreshing]="loading()"
          (refresh)="reload()"
        >
          @for (item of items(); track item) {
            <div style="padding: 0.875rem 1rem; border-bottom: 1px solid var(--wr-color-outline)">{{ item }}</div>
          }
        </wr-pull-to-refresh>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
