<ngwr-doc-page
  title="Icon"
  description="The icon renderer. Resolves a registered name from the `provideWrIcons` registry and inlines its SVG. ngwr ships no built-in icons — bring your own via an adapter or `svgIcon()`."
  [keywords]="['icon', 'wr-icon', 'svg']"
  [labels]="['Component']"
>
  <ngwr-doc-section title="Register icons">
    <ngwr-doc-code [code]="snippets.register" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Use">
    <ngwr-doc-code [code]="snippets.use" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; gap: 0.75rem; align-items: center; font-size: 1.25rem">
        <wr-icon name="plus" />
        <wr-icon name="trash" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Custom inline SVG"
    description="When you need a one-off icon (your logo, a designer hand-off) wrap it with `svgIcon()`."
  >
    <ngwr-doc-code [code]="snippets.custom" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="See also"
    description="Browse / install icon sets in the [Icons section](/icons) — Lucide, Feather, Tabler, Phosphor, Heroicons, Iconoir, Radix, Bootstrap. Pair with [`ng g ngwr:icon-set`](/getting-started/schematics) for a one-shot scaffold."
  />
</ngwr-doc-page>
