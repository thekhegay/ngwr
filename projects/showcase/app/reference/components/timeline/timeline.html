<ngwr-doc-page
  title="Timeline"
  description="Event ladder with markers. Vertical (default) or horizontal. Dot colors: primary / success / warning / danger / medium."
  [keywords]="['timeline', 'wr-timeline']"
>
  <ngwr-doc-section title="Vertical">
    <ngwr-doc-code [code]="snippet" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-timeline>
        <wr-timeline-item title="Created" time="2026-05-01">Initial commit.</wr-timeline-item>
        <wr-timeline-item title="Reviewed" time="2026-05-02" color="warning">Three changes requested.</wr-timeline-item>
        <wr-timeline-item title="Merged" time="2026-05-03" color="success">Squashed and merged.</wr-timeline-item>
        <wr-timeline-item title="Deployed" time="2026-05-04">Live in production.</wr-timeline-item>
      </wr-timeline>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Horizontal">
    <ngwr-doc-code [code]="horizontalSnippet" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-timeline orientation="horizontal">
        <wr-timeline-item title="Plan" time="Q1">Scope agreed.</wr-timeline-item>
        <wr-timeline-item title="Build" time="Q2" color="warning">In progress.</wr-timeline-item>
        <wr-timeline-item title="Ship" time="Q3" color="success">Released.</wr-timeline-item>
      </wr-timeline>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API" description="`<wr-timeline>` inputs.">
    <ngwr-doc-api [rows]="timelineApi" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Item API" description="`<wr-timeline-item>` inputs.">
    <ngwr-doc-api [rows]="itemApi" />
  </ngwr-doc-section>
</ngwr-doc-page>
