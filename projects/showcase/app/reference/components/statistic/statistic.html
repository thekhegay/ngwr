<ngwr-doc-page
  title="Statistic"
  description="KPI card — label + big number + optional prefix / suffix + delta."
  [keywords]="['statistic', 'kpi', 'wr-statistic']"
>
  <ngwr-doc-section title="Basic">
    <ngwr-doc-code [code]="snippet" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; gap: 2.5rem; flex-wrap: wrap">
        <wr-statistic label="Active users" [value]="12345" />
        <wr-statistic label="Revenue" [value]="9512" prefix="$" [delta]="12.4" />
        <wr-statistic label="Churn" [value]="1.8" suffix="%" [delta]="-0.4" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Dashboard grid"
    description="`<wr-statistic-group>` lays cards out in a grid that reflows on its OWN width — a container query, not a viewport breakpoint — so it adapts inside any column, card, or split pane. Drag the handle at the bottom-right to watch the columns step down. `min` sets the narrowest column; `columns` caps how many sit in a row."
  >
    <ngwr-doc-code [code]="groupSnippet" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div
        style="
          resize: horizontal;
          overflow: auto;
          min-width: 15rem;
          max-width: 100%;
          padding: 1rem;
          border: 1px dashed var(--wr-color-outline);
          border-radius: var(--wr-border-radius-base);
        "
      >
        <wr-statistic-group [columns]="4" min="11rem">
          <wr-statistic label="Active users" [value]="12345" />
          <wr-statistic label="Revenue" [value]="9512" prefix="$" [delta]="12.4" />
          <wr-statistic label="Churn" [value]="1.8" suffix="%" [delta]="-0.4" />
          <wr-statistic label="Sessions" [value]="48210" />
        </wr-statistic-group>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Count up"
    description="A live dashboard — values randomize on a timer (~2s) and tween from their previous value to the new one (~700ms ease-out). The delta swings positive/negative so the up/down indicator flips green/red. Honours `precision`, opts out via `[animate]='false'`, and respects `prefers-reduced-motion`."
  >
    <ngwr-doc-code [code]="countUpSnippet" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; gap: 2.5rem; flex-wrap: wrap">
        <wr-statistic label="Revenue" prefix="$" [value]="revenue()" [precision]="2" [delta]="delta()" />
        <wr-statistic label="Sessions" [value]="sessions()" />
        <wr-statistic label="Sessions (no animation)" [value]="sessions()" [animate]="false" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Countdown"
    description="`<wr-statistic-countdown>` ticks down to a target date. Format tokens: `D/H/m/s` (doubled for zero-padded width 2), plus `SSS` for milliseconds."
  >
    <ngwr-doc-code [code]="countdownSnippet" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; gap: 2.5rem; flex-wrap: wrap">
        <wr-statistic-countdown label="Launch in" [target]="launchDate()" format="D days HH:mm:ss" />
        <wr-statistic-countdown
          label="Soon (fires in ~30s)"
          [target]="soonDate()"
          format="mm:ss"
          endText="Live!"
          (countdownEnd)="onLive()"
        />
        @if (fired()) {
          <wr-statistic label="(countdownEnd) fired" value="✓" />
        }
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
