<ngwr-doc-page
  title="Table"
  description="Data table with sortable / filterable headers and custom cell templates."
  [keywords]="['table', 'wr-table']"
  [labels]="['Component', 'Directive', 'Standalone']"
>
  <ngwr-doc-section title="Installation">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Basic usage"
    description="Define columns as a record keyed by row property names. Rows are plain objects."
  >
    <ngwr-doc-snippet [code]="snippets.basic">
      <div style="width: 100%">
        <wr-table [columns]="columns" [items]="visibleRows()" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Sort + filter + custom cell"
    description="Sortable columns cycle asc → desc → off. Filter dropdown emits the selected items via filterChange. Project an [wrTableCell] template to customize a column's rendering."
  >
    <ngwr-doc-snippet [code]="snippets.custom">
      <div style="width: 100%">
        <wr-table [columns]="columns" [items]="visibleRows()" [(sort)]="sort" (filterChange)="onFilter($event)">
          <ng-template wrTableCell="role" let-value>
            <wr-tag [color]="value === 'admin' ? 'danger' : value === 'editor' ? 'primary' : 'medium'" transparent>
              {{ value }}
            </wr-tag>
          </ng-template>
        </wr-table>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Pagination"
    description="Set `[pageSize]` for client-side pagination — the table slices rows automatically and renders a `<wr-pagination>` footer. Pass `[totalItems]` to switch to server-side mode (you handle slicing)."
  >
    <ngwr-doc-snippet [code]="snippets.paginated">
      <div style="width: 100%">
        <wr-table [columns]="columns" [items]="paginatedRows" [pageSize]="5" [(page)]="page" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Row selection"
    description="Set `rowSelection` to `'multiple'` (checkboxes + a select-all header) or `'single'`. Bind `[(selection)]` to the selected row keys, and `rowKey` to identify rows (a property name or a function)."
  >
    <ngwr-doc-code [code]="snippets.selection" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="width: 100%">
        <wr-table
          rowSelection="multiple"
          rowKey="email"
          [(selection)]="selected"
          [columns]="columns"
          [items]="visibleRows()"
        />
        <div style="margin-top: 0.75rem; font-size: 0.875rem; color: var(--wr-color-on-surface-muted)">
          selected: <strong>{{ selected().length }}</strong>
        </div>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Expandable rows"
    description="Project an `<ng-template wrTableExpand let-row>` to reveal a detail panel per row — it adds a leading chevron column. Bind `[(expanded)]` (row keys) and set `rowKey`."
  >
    <ngwr-doc-code [code]="snippets.expandable" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="width: 100%">
        <wr-table rowKey="email" [(expanded)]="expanded" [columns]="columns" [items]="visibleRows()">
          <ng-template wrTableExpand let-row>
            <div style="font-size: 0.875rem; color: var(--wr-color-on-surface-muted)">
              <strong>{{ row.name }}</strong> — {{ row.email }} · role: {{ row.role }}
            </div>
          </ng-template>
        </wr-table>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Summary row"
    description="Give a column a `summary` — a built-in aggregate (`'sum'` / `'avg'` / `'count'` / `'min'` / `'max'`) over its numeric values, or a function of all rows. A footer row appears with the results (computed over the current `items`)."
  >
    <ngwr-doc-code [code]="snippets.summary" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <div style="width: 100%">
        <wr-table [columns]="summaryColumns" [items]="summaryRows" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="CSV export"
    description="Call `exportCsv()` on the table (via a template ref) to download its rows — headers from the column titles, values from the row data, in the current column order. It covers the current `items`, so in server-side mode (`totalItems` set) that's the current page. `{ selectedOnly: true }` exports just the selected rows; `toCsv()` returns the string instead of downloading."
  >
    <ngwr-doc-code [code]="snippets.csv" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; width: 100%; flex-direction: column; gap: 0.75rem">
        <wr-table #csvTable [columns]="columns" [items]="visibleRows()" />
        <div>
          <wr-btn size="sm" (click)="csvTable.exportCsv({ filename: 'users.csv' })">Export CSV</wr-btn>
        </div>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Pinned columns"
    description="Set `pin: 'left'` or `pin: 'right'` on a column to freeze it against that edge while the rest scrolls horizontally. Several per side stack in order, and offsets are measured so columns of any width line up. Scroll the table below sideways — Name stays left, Status stays right."
  >
    <ngwr-doc-code [code]="snippets.pinned" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <div style="max-width: 34rem">
        <wr-table [columns]="wideColumns" [items]="wideRows" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Resizable columns"
    description="Set `resizable: true` for a drag handle on the header's right edge. The first drag freezes the current widths and switches the table to fixed layout so resizing is exact in both directions; `width` sets an initial px width."
  >
    <ngwr-doc-code [code]="snippets.resizable" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <div style="width: 100%">
        <wr-table [columns]="resizableColumns" [items]="visibleRows()" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Reorderable columns"
    description="Set `reorderable` to drag column headers into a new order. Bind `[(columnOrder)]` (an array of keys) to control or persist the arrangement. Pinned columns stay anchored — they aren't draggable."
  >
    <ngwr-doc-code [code]="snippets.reorderable" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="width: 100%">
        <wr-table reorderable [columns]="columns" [items]="visibleRows()" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Narrow container (stacked cards)"
    description="With `responsive`, each row collapses to a labelled card when the table's own box is too narrow for columns — a container query on its own width, so it adapts inside a split pane on any screen. Every cell shows its column title as a label. The box below is fixed at 360px."
  >
    <ngwr-doc-snippet code='<div style="width: 360px"><wr-table responsive [columns]="columns" [items]="rows" /></div>'>
      <div style="width: 360px; max-width: 100%">
        <wr-table responsive [columns]="columns" [items]="visibleRows()" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Types" description="Data shapes used by the inputs and outputs above.">
    <ngwr-doc-code [code]="typeSnippet" language="angular-ts" />
    <ngwr-doc-api [rows]="typeRows" />
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
