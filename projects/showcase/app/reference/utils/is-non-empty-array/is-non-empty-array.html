<ngwr-doc-page
  title="isNonEmptyArray"
  description="Type-narrowing predicate for arrays with at least one element — gives you `[T, ...T[]]` so you can index `[0]` without a non-null assertion."
  [keywords]="['isNonEmptyArray', 'type guard', 'utils']"
  [labels]="['Util']"
>

    <ngwr-doc-code [code]="snippet" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Why ngwr provides this"
    description="With strict TS (`noUncheckedIndexedAccess: true`), `if (arr.length > 0) arr[0]` still types `arr[0]` as `T | undefined` — TS can't connect the length check to the index access. The guard narrows the tuple shape to `[T, ...T[]]` so `[0]` is `T`. Saves a non-null assertion."
  >
