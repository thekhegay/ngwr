<ngwr-doc-page
  title="WrPlatform"
  description="SSR-safe environment probes. Use to gate browser-only code paths and react to user preferences."
  [keywords]="['service', 'platform', 'SSR', 'WrPlatform']"
  [labels]="['Service']"
>
  <ngwr-doc-section title="Usage">
    <ngwr-doc-code [code]="snippets.usage" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <div style="font-family: var(--wr-font-family-base); font-size: 0.875rem; line-height: 1.5">
        <div>
          isBrowser: <strong>{{ isBrowser }}</strong>
        </div>
        <div>
          prefersDark: <strong>{{ prefersDark() }}</strong>
        </div>
        <div>
          prefersReducedMotion: <strong>{{ prefersReducedMotion() }}</strong>
        </div>
        <small style="color: var(--wr-color-medium)">Reflects your OS / browser preferences.</small>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Why ngwr provides this"
    description="`isPlatformBrowser(inject(PLATFORM_ID))` boilerplate in every browser-only code path gets old. One injectable with `isBrowser`, `prefersDark`, and `prefersReducedMotion` signals replaces it."
  />

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="WrVisualViewport"
    description="A second `ngwr/platform` service tracking `window.visualViewport` — the slice of the layout viewport still visible once the on-screen keyboard is accounted for. `provideWrOverlay()` eagerly instantiates it, so responsive overlay sheets and the command-palette lift above the keyboard out of the box; inject it directly for custom handling. Try it on a phone — focus a text field and watch the value change."
  >
    <ngwr-doc-code [code]="snippets.viewport" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <div style="font-family: var(--wr-font-family-base); font-size: 0.875rem; line-height: 1.5">
        <div>
          bottomInset (keyboard): <strong>{{ bottomInset() }}px</strong>
        </div>
        <div>
          offsetTop: <strong>{{ offsetTop() }}px</strong>
        </div>
        <small style="color: var(--wr-color-medium)">0 on desktop / without the VisualViewport API.</small>
      </div>
    </ngwr-doc-snippet>
    <ngwr-doc-api [rows]="viewportApi" />
  </ngwr-doc-section>
</ngwr-doc-page>
