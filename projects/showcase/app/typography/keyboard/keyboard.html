<ngwr-doc-page
  title="Keyboard caps"
  description="`<wr-kbd>` renders projected content (`⌘`, `K`, `Enter`, etc.) in a beveled keycap. Stack with `+` between for shortcut chords inside prose."
  [keywords]="['kbd', 'keyboard', 'shortcut', 'keycap']"
  [labels]="['Component']"
>
  <ngwr-doc-section title="Install">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Basic">
    <ngwr-doc-code [code]="snippets.basic" language="angular-html" />
    <ngwr-doc-snippet code="">
      <p wrTypography>
        <wr-kbd>⌘</wr-kbd> + <wr-kbd>K</wr-kbd> to search.
      </p>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Sizes">
    <ngwr-doc-code [code]="snippets.sizes" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; gap: 0.5rem; align-items: center">
        <wr-kbd size="sm">Esc</wr-kbd>
        <wr-kbd size="md">Enter</wr-kbd>
        <wr-kbd size="lg">Space</wr-kbd>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Inside prose">
    <ngwr-doc-code [code]="snippets.prose" language="angular-html" />
    <ngwr-doc-snippet code="">
      <p wrTypography style="max-width: 32rem">
        Press <wr-kbd>⌘</wr-kbd> + <wr-kbd>P</wr-kbd> to open the command palette.
      </p>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
