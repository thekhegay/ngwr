<nav class="ngwr-sidebar__inner" aria-label="Documentation">
  @for (group of groups; track group.title) {
    <!-- Direct-link group: single page, no expand toggle. -->
    @if (group.url) {
      <a
        class="ngwr-sidebar__group-link"
        routerLinkActive="ngwr-sidebar__group-link--active"
        [routerLink]="group.url"
        (click)="onLinkClick()"
      >
        <span class="ngwr-sidebar__group-title">{{ group.title }}</span>
      </a>
    } @else {
      <!-- Expandable group with children. -->
      <section class="ngwr-sidebar__group" [class.ngwr-sidebar__group--collapsed]="!isOpen(group.title)">
        <button
          type="button"
          class="ngwr-sidebar__group-toggle"
          [attr.aria-expanded]="isOpen(group.title)"
          (click)="toggleGroup(group.title)"
        >
          <span class="ngwr-sidebar__group-title">{{ group.title }}</span>
          <wr-icon class="ngwr-sidebar__group-chevron" name="chevron-down" size="14" />
        </button>

        <div class="ngwr-sidebar__group-wrap" [attr.aria-hidden]="!isOpen(group.title)">
          <div class="ngwr-sidebar__group-body">
            <div class="ngwr-sidebar__group-inner">
              @if (group.children) {
                <ul class="ngwr-sidebar__list">
                  @for (link of group.children; track link.title) {
                    <li>
                      @if (link.disabled || !link.url) {
                        <span class="ngwr-sidebar__link ngwr-sidebar__link--disabled" aria-disabled="true">
                          <span class="ngwr-sidebar__link-title">{{ link.title }}</span>
                          <small class="ngwr-sidebar__badge">soon</small>
                        </span>
                      } @else {
                        <a
                          class="ngwr-sidebar__link"
                          routerLinkActive="ngwr-sidebar__link--active"
                          [routerLink]="link.url"
                          (click)="onLinkClick()"
                        >
                          <span class="ngwr-sidebar__link-title">{{ link.title }}</span>
                        </a>
                      }
                    </li>
                  }
                </ul>
              }
            </div>
          </div>
        </div>
      </section>
    }
  }
</nav>
