<div class="ngwr-header__inner">
  @if (isDocsRoute()) {
    <button
      type="button"
      class="ngwr-header__toggle"
      [class.ngwr-header__toggle--opened]="layoutState.sidebarOpen()"
      [attr.aria-expanded]="layoutState.sidebarOpen()"
      aria-label="Toggle navigation"
      (click)="onToggleSidebar()"
    >
      <span class="ngwr-header__toggle-bar"></span>
      <span class="ngwr-header__toggle-bar"></span>
      <span class="ngwr-header__toggle-bar"></span>
    </button>
  }

  <a
    class="ngwr-header__brand"
    routerLink="/"
    routerLinkActive="ngwr-header__brand--active"
    [routerLinkActiveOptions]="{ exact: true }"
  >
    <img class="ngwr-header__brand-mark" src="/images/logo-mark-color.svg" alt="" />
    <span class="ngwr-header__brand-name">ngwr</span>
  </a>

  <nav class="ngwr-header__nav" aria-label="Primary">
    <a class="ngwr-header__nav-link" routerLink="/docs" routerLinkActive="ngwr-header__nav-link--active">Docs</a>
  </nav>

  <div class="ngwr-header__actions">
    <button
      type="button"
      class="ngwr-header__action ngwr-header__action--theme"
      [attr.aria-label]="theme.resolved() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
      (click)="onToggleTheme()"
    >
      <wr-icon [name]="theme.resolved() === 'dark' ? 'sun' : 'moon'" />
    </button>
    @for (action of actions; track action.url) {
      <a
        class="ngwr-header__action ngwr-header__action--{{ action.modifier }}"
        [href]="action.url"
        [attr.aria-label]="action.label"
        target="_blank"
        rel="noopener noreferrer"
      >
        <wr-icon [name]="action.icon" />
      </a>
    }
  </div>
</div>
