<ngwr-doc-page
  title="wrAutofocus"
  description="Moves DOM focus to the host on init. Bind a boolean to focus reactively whenever the expression becomes truthy."
  [keywords]="['wrAutofocus', 'autofocus', 'directive']"
  [labels]="['Directive']"
>
  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Usage">
    <ngwr-doc-code [code]="snippets.usage" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap">
        <wr-btn (click)="focusInput()">Focus input</wr-btn>
        <input wrInput [wrAutofocus]="autofocusOn()" placeholder="I focus when toggled on" style="max-width: 18rem" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
