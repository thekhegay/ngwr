<ngwr-doc-page
  title="wrTruncate"
  description="Clamp string length with optional ellipsis."
  [keywords]="['pipe', 'wrTruncate', 'truncate', 'string', 'ellipsis']"
  [labels]="['Pipe']"
>
  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Basic usage" description="Strings shorter than the limit pass through untouched.">
    <ngwr-doc-code [code]="snippets.basic" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div>{{ longText() | wrTruncate: 24 }}</div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Custom ellipsis" description="Third argument replaces the default `…`.">
    <ngwr-doc-code [code]="snippets.ellipsis" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div>{{ longText() | wrTruncate: 24 : ' [more]' }}</div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Playground">
    <ngwr-doc-playground [code]="playgroundSnippet()" [controls]="controls">
      <p class="ngwr-pipe-output">{{ text() | wrTruncate: length() : ellipsis() }}</p>
    </ngwr-doc-playground>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
