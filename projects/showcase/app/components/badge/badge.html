<ngwr-doc-page
  title="Badge"
  description="Small status indicator with color variants and optional pill shape. Reach for `<wr-tag>` (in the same entry) when you need a richer label — icons, loading state, outlined / transparent styles."
  [keywords]="['badge', 'tag', 'status', 'wr-badge', 'wr-tag']"
  [labels]="['Component', 'Standalone']"
>
  <ngwr-doc-section title="Installation">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Basic usage">
    <ngwr-doc-snippet [code]="snippets.basic">
      <wr-badge>New</wr-badge>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Colors">
    <ngwr-doc-snippet [code]="snippets.colors">
      @for (c of colors; track c) {
        <wr-badge [color]="c">{{ c }}</wr-badge>
      }
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Sizes">
    <ngwr-doc-snippet [code]="snippets.sizes">
      <wr-badge size="sm">12</wr-badge>
      <wr-badge size="md">12</wr-badge>
      <wr-badge size="lg">12</wr-badge>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Shape"
    description="`rounded` (default) keeps the small form-radius; `pill` rounds the ends fully."
  >
    <ngwr-doc-snippet [code]="snippets.shape">
      @for (c of colors; track c) {
        <wr-badge [color]="c" shape="pill">{{ c }}</wr-badge>
      }
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Tag — icons + loading"
    description="`<wr-tag>` is the richer sibling. Same entry (`ngwr/badge`), but supports icons, loading state, and outlined / transparent variants."
  >
    <ngwr-doc-code [code]="snippets.tag" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; flex-wrap: wrap; gap: 0.5rem">
        <wr-tag color="success" icon="checkmark">Done</wr-tag>
        <wr-tag color="primary" outlined rounded>Beta</wr-tag>
        <wr-tag color="warning" loading>Saving</wr-tag>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
