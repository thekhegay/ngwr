<ngwr-doc-page
  title="Keyboard"
  description="Keycap chip for rendering keyboard shortcuts in copy. Stack with a plain `+` between caps for chords."
  [keywords]="['kbd', 'keyboard', 'keycap', 'shortcut', 'wr-kbd']"
  [labels]="['Display']"
>
  <ngwr-doc-section title="Installation">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Basic">
    <ngwr-doc-code [code]="snippets.basic" language="angular-html" />
    <ngwr-doc-snippet code="">
      <p>Open the command palette: <wr-kbd>⌘</wr-kbd> + <wr-kbd>K</wr-kbd></p>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Sizes">
    <ngwr-doc-code [code]="snippets.sizes" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; align-items: center; gap: 0.5rem">
        <wr-kbd size="sm">Esc</wr-kbd>
        <wr-kbd size="md">Enter</wr-kbd>
        <wr-kbd size="lg">⌫</wr-kbd>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Full keyboard"
    description="Every cap rendered in a 60% ANSI-ish layout so glyphs, widths, and proportions can be eyeballed at once."
  >
    <ngwr-doc-code [code]="snippets.layout" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div
        style="
          display: flex;
          flex-direction: column;
          gap: 0.375rem;
          padding: 1rem;
          background: rgba(var(--wr-color-light-rgb), 0.35);
          border: 1px solid var(--wr-color-light);
          border-radius: 0.625rem;
        "
      >
        @for (row of rows; track $index) {
          <div style="display: flex; gap: 0.25rem">
            @for (key of row; track $index) {
              <wr-kbd
                size="md"
                [style.flex]="key.w ? `0 0 ${key.w * 1.75}rem` : '0 0 1.75rem'"
                [style.minWidth]="key.w ? `${key.w * 1.75}rem` : '1.75rem'"
              >
                {{ key.cap }}
              </wr-kbd>
            }
          </div>
        }
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
