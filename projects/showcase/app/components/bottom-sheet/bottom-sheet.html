<ngwr-doc-page
  title="Bottom Sheet"
  description="Mobile-friendly drawer that slides up from the bottom. Rounded top corners, optional drag-handle indicator, backdrop + Escape to close. Focus is trapped inside while open."
  [keywords]="['bottom-sheet', 'wr-bottom-sheet', 'drawer', 'mobile']"
  [labels]="['Component']"
>
  <ngwr-doc-section title="Basic">
    <ngwr-doc-code [code]="snippet" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; gap: 0.5rem; flex-wrap: wrap">
        <button wr-btn color="primary" (click)="open.set(true)">Open (auto height)</button>
        <button wr-btn (click)="openTall.set(true)">Open (60vh)</button>
      </div>

      <wr-bottom-sheet [(open)]="open">
        <h2 style="margin: 0 0 0.5rem">Quick actions</h2>
        <p style="margin: 0 0 1rem; color: rgba(0, 0, 0, 0.6)">
          Drag the handle, click the backdrop, or press Escape to close.
        </p>
        <div style="display: flex; gap: 0.5rem">
          <button wr-btn color="primary" (click)="open.set(false)">Done</button>
          <button wr-btn (click)="open.set(false)">Cancel</button>
        </div>
      </wr-bottom-sheet>

      <wr-bottom-sheet [(open)]="openTall" height="60vh">
        <h2 style="margin: 0 0 0.75rem">Taller sheet (60vh)</h2>
        @for (i of [].constructor(20); track $index) {
          <p style="margin: 0.5rem 0; color: rgba(0, 0, 0, 0.7)">Row {{ $index + 1 }} — scrollable body.</p>
        }
      </wr-bottom-sheet>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
