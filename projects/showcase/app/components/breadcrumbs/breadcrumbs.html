<ngwr-doc-page
  title="Breadcrumbs"
  description="Navigation trail showing the user's location in the site hierarchy. `<wr-breadcrumbs-item>` renders as a `<li>` containing either an `<a>` (when linked) or a `<span aria-current=&quot;page&quot;>` (the final crumb). Separator is a CSS pseudo-element so it doesn't pollute the accessibility tree. Each item accepts an optional leading icon."
  [keywords]="['breadcrumbs', 'wr-breadcrumbs', 'navigation', 'a11y']"
  [labels]="['Component']"
>
  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Playground">
    <ngwr-doc-playground [code]="snippet()" [controls]="controls">
      <wr-breadcrumbs [separator]="separator()" [ariaLabel]="ariaLabel()">
        <wr-breadcrumbs-item icon="home" routerLink="/">Home</wr-breadcrumbs-item>
        <wr-breadcrumbs-item icon="folder" routerLink="/components">Components</wr-breadcrumbs-item>
        <wr-breadcrumbs-item routerLink="/components/breadcrumbs">Breadcrumbs</wr-breadcrumbs-item>
        <wr-breadcrumbs-item>Current page</wr-breadcrumbs-item>
      </wr-breadcrumbs>
    </ngwr-doc-playground>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
