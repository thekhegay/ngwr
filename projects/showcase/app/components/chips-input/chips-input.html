<ngwr-doc-page
  title="Chips Input"
  description="Type-to-add tag entry. Each typed value becomes a chip; backspace at empty input removes the last chip. Pasting `a, b, c` splits on commas → adds 3 chips. Implements `ControlValueAccessor` — binds with `[(ngModel)]`."
  [keywords]="['chips', 'tags', 'wr-chips-input', 'input']"
  [labels]="['Component']"
>
  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Basic">
    <ngwr-doc-code [code]="snippets.basic" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; flex-direction: column; gap: 0.5rem; width: 100%; max-width: 28rem">
        <wr-chips-input [(ngModel)]="tags" placeholder="Add a tag" />
        <p style="margin: 0; color: rgba(0,0,0,0.6); font-size: 0.875rem">
          Value: <code>{{ tags() | json }}</code>
        </p>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="With validator + max items">
    <ngwr-doc-code [code]="snippets.validate" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; flex-direction: column; gap: 0.5rem; width: 100%; max-width: 28rem">
        <wr-chips-input
          [(ngModel)]="recipients"
          placeholder="Add email + Enter or comma (max 5)"
          [validate]="isEmail"
          [maxItems]="5"
        />
        <p style="margin: 0; color: rgba(0,0,0,0.6); font-size: 0.875rem">
          Only valid emails are accepted. Try pasting <code>a&#64;x.dev, b&#64;x.dev, notanemail, c&#64;x.dev</code>.
        </p>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
