<ngwr-doc-page
  title="Breadcrumb"
  description="Navigation trail showing the user's location in the site hierarchy. `<wr-breadcrumb-item>` renders as a `<li>` containing either an `<a>` (when linked) or a `<span aria-current=&quot;page&quot;>` (the final crumb). Separator is a CSS pseudo-element so it doesn't pollute the accessibility tree."
  [keywords]="['breadcrumb', 'wr-breadcrumb', 'navigation', 'a11y']"
  [labels]="['Component']"
>
  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Playground">
    <ngwr-doc-playground [code]="snippet()" [controls]="controls">
      <wr-breadcrumb [separator]="separator()" [ariaLabel]="ariaLabel()">
        <wr-breadcrumb-item routerLink="/">Home</wr-breadcrumb-item>
        <wr-breadcrumb-item routerLink="/components">Components</wr-breadcrumb-item>
        <wr-breadcrumb-item routerLink="/components/breadcrumb">Breadcrumb</wr-breadcrumb-item>
        <wr-breadcrumb-item>Current page</wr-breadcrumb-item>
      </wr-breadcrumb>
    </ngwr-doc-playground>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
