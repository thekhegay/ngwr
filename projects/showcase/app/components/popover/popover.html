<ngwr-doc-page
  title="Popover"
  description='Anchored content panel. Project a template (popover) or pass a plain string (tooltip — use `mode="tooltip"`). Click, hover, or focus to open. Built on CDK Overlay.'
  [keywords]="['popover', 'tooltip', 'wr-popover', 'overlay']"
  [labels]="['Directive', 'CDK Overlay']"
>
  <ngwr-doc-section title="Installation">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Basic usage">
    <ngwr-doc-snippet [code]="snippets.basic">
      <wr-btn color="primary" [wrPopover]="info">Details</wr-btn>

      <ng-template #info>
        <div style="padding: 1rem; max-width: 18rem">
          <p style="margin: 0 0 0.375rem; font-weight: 600">About NGWR</p>
          <p style="margin: 0; color: var(--wr-color-medium); font-size: 0.8125rem">
            A signals-first Angular component library. Pop anything in here — forms, code, summaries.
          </p>
        </div>
      </ng-template>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Hover trigger">
    <ngwr-doc-snippet [code]="snippets.hover">
      <wr-btn [wrPopover]="card" trigger="hover">Hover me</wr-btn>

      <ng-template #card>
        <div style="padding: 0.875rem 1rem; color: var(--wr-color-medium); font-size: 0.8125rem">
          Closes when the pointer leaves both trigger and panel.
        </div>
      </ng-template>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Positions">
    <ngwr-doc-snippet [code]="snippets.positions">
      <wr-btn [wrPopover]="hint" position="bottom-start">Bottom start</wr-btn>
      <wr-btn [wrPopover]="hint" position="top-end">Top end</wr-btn>
      <wr-btn [wrPopover]="hint" position="right">Right</wr-btn>

      <ng-template #hint>
        <div style="padding: 0.625rem 0.875rem; font-size: 0.8125rem">CDK auto-flips if there's no room.</div>
      </ng-template>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Tooltip mode"
    description='Pass a string + `mode="tooltip"` for a small dark hint panel. Opens on hover / focus, dismisses on blur, pointer-leave, or Escape. Uses `aria-describedby` instead of `aria-haspopup`.'
  >
    <ngwr-doc-snippet [code]="snippets.tooltip">
      <wr-btn color="primary" wrPopover="Save changes" mode="tooltip" position="top">Save</wr-btn>
      <wr-btn wrPopover="Remove permanently" mode="tooltip" position="bottom">Delete</wr-btn>
      <wr-btn wrPopover="Open in a new window" mode="tooltip" position="right">Open</wr-btn>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Tooltip — custom delays">
    <ngwr-doc-snippet [code]="snippets.tooltipDelays">
      <wr-btn wrPopover="Slow to appear" mode="tooltip" [showDelay]="500" [hideDelay]="100">Hover</wr-btn>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
