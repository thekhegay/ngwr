<ngwr-doc-page
  title="Typography"
  description="Semantic + display variants reading from the `--wr-text-*` / `--wr-font-weight-*` tokens. Themeable by overriding tokens at `:root`."
  [keywords]="['typography', 'heading', 'text', 'wr-typography']"
  [labels]="['Display']"
>
  <ngwr-doc-section title="Installation">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Variants">
    <ngwr-doc-code [code]="snippets.variants" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; flex-direction: column; gap: 1rem">
        <p wrTypography variant="display">Display</p>
        <p wrTypography variant="h1">Heading 1</p>
        <p wrTypography variant="h2">Heading 2</p>
        <p wrTypography variant="h3">Heading 3</p>
        <p wrTypography variant="lead">Lead paragraph — a calmer subhead.</p>
        <p wrTypography>Body copy in the default variant.</p>
        <p wrTypography variant="small">Small print.</p>
        <p wrTypography variant="caption">Captions and helper text.</p>
        <p wrTypography variant="overline">Section label</p>
        <p wrTypography variant="code">code()</p>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Tones">
    <ngwr-doc-code [code]="snippets.tones" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; flex-direction: column; gap: 0.25rem">
        <p wrTypography tone="primary">Primary</p>
        <p wrTypography tone="success">Success</p>
        <p wrTypography tone="warning">Warning</p>
        <p wrTypography tone="danger">Danger</p>
        <p wrTypography tone="medium">Muted</p>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Alignment + truncation">
    <ngwr-doc-code [code]="snippets.modifiers" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; flex-direction: column; gap: 0.5rem">
        <p wrTypography align="center">Centered</p>
        <p wrTypography [truncate]="true" style="max-width: 16rem; display: inline-block">
          A long line that gets ellipsized when it overflows the container.
        </p>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
