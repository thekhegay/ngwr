<ngwr-doc-page
  title="Tag"
  description="Small inline label. Supports icons, loading state, and three visual styles."
  [keywords]="['tag', 'label', 'chip', 'wr-tag']"
  [labels]="['Component', 'Standalone']"
>
  <ngwr-doc-section title="Installation">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Basic usage">
    <ngwr-doc-snippet [code]="snippets.basic">
      <wr-tag>Tag</wr-tag>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Colors">
    <ngwr-doc-snippet [code]="snippets.colors">
      @for (c of colors; track c) {
        <wr-tag [color]="c">{{ c }}</wr-tag>
      }
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Outlined">
    <ngwr-doc-snippet [code]="snippets.outlined">
      @for (c of colors; track c) {
        <wr-tag [color]="c" outlined>{{ c }}</wr-tag>
      }
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Transparent">
    <ngwr-doc-snippet [code]="snippets.transparent">
      @for (c of colors; track c) {
        <wr-tag [color]="c" transparent>{{ c }}</wr-tag>
      }
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Rounded">
    <ngwr-doc-snippet [code]="snippets.rounded">
      @for (c of colors; track c) {
        <wr-tag [color]="c" rounded>{{ c }}</wr-tag>
      }
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="With icon"
    description="Pass any icon registered via provideWrIcons. iconPosition switches between start/end."
  >
    <ngwr-doc-snippet [code]="snippets.icons">
      <wr-tag color="success" icon="checkmark">Done</wr-tag>
      <wr-tag color="danger" icon="close" iconPosition="end">Failed</wr-tag>
      <wr-tag color="warning" icon="warning" outlined>Pending</wr-tag>
      <wr-tag color="primary" icon="flash" rounded transparent>Beta</wr-tag>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Loading" description="Replaces the icon with a spinner; preserves layout.">
    <ngwr-doc-snippet [code]="snippets.loading">
      <wr-tag color="primary" loading>Saving</wr-tag>
      <wr-tag color="success" loading outlined>Syncing</wr-tag>
      <wr-tag color="danger" loading transparent rounded>Retrying</wr-tag>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>

  <ngwr-doc-see-also [links]="seeAlso" />
</ngwr-doc-page>
