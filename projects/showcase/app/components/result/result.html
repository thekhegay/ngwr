<ngwr-doc-page
  title="Result"
  description="Large-illustration result / empty-state. Built-in statuses: success / warning / error / info / empty. Plus ready-made `<wr-result-404>`, `<wr-result-403>`, `<wr-result-500>` presets."
  [keywords]="['result', 'empty', '404', '403', '500', 'wr-result']"
>
  <ngwr-doc-section title="Statuses">
    <ngwr-doc-code [code]="snippet" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div class="result-grid">
        <wr-result status="success" title="Submitted" />
        <wr-result status="warning" title="Heads up" />
        <wr-result status="error" title="Failed" />
        <wr-result status="empty" title="No projects" />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Presets"
    description="Drop-in 404 / 403 / 500 pages. Pass `title` / `description` to override the defaults for localisation."
  >
    <ngwr-doc-code [code]="presets" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div class="result-grid">
        <wr-result-404 />
        <wr-result-403 />
        <wr-result-500 />
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
