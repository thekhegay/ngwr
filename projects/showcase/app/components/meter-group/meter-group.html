<ngwr-doc-page
  title="Meter Group"

  [keywords]="['meter', 'progress', 'wr-meter-group']"
  [labels]="['Display']"
>
  <ngwr-doc-section title="Disk usage">
    <ngwr-doc-code [code]="snippet" language="angular-html" />

      <wr-meter-group style="width: 100%" [segments]="diskUsage" />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Types" description="Data shapes used by the inputs and outputs above.">
    <ngwr-doc-code [code]="typeSnippet" language="angular-ts" />
    <ngwr-doc-api [rows]="typeRows" />
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>

  <ngwr-doc-section title="WrMeterSegment">
    <ngwr-doc-api [rows]="segmentApi" />
  </ngwr-doc-section>
</ngwr-doc-page>
