<ngwr-doc-page
  title="noWhitespace"
  description="Reject any space, tab, or other whitespace inside the value. Empty values pass."
  [keywords]="['noWhitespace', 'username', 'validator', 'wr-validators']"
  [labels]="['Validator']"
>
  <ngwr-doc-section title="Live demo">
    <ngwr-doc-snippet code="">
      <div style="display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-start; min-width: 18rem">
        <input wrInput [formControl]="control" placeholder="username" />
        <code style="font-size: 0.8125rem">errors: {{ control.errors | json }}</code>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Usage">
    <ngwr-doc-code [code]="snippet" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Why ngwr provides this"
    description="Angular's `required` happily accepts a string of spaces. This rejects whitespace anywhere in the value without you trimming the model on every keystroke."
  />

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
