<ngwr-doc-page
  title="Internationalization (i18n)"
  description="Catalog-driven translations with double-brace interpolation, scopes, and a reactive locale switch. For the basic `provideWrI18n` wiring see [Configuration](/getting-started/configuration); this page is the primer for the i18n subsystem itself."
  [keywords]="['i18n', 'translation', 'locale', 'wrT', 'tutorial']"
  [labels]="['Core']"
>
  <ngwr-doc-section
    title="Static loader"
    description="The simplest way to start — your catalogs live in code, no HTTP calls. Spread the base catalogs ngwr ships with so built-in component strings (table empty state, pagination labels, select placeholder…) already resolve, then add your own keys alongside."
  >
    <ngwr-doc-code [code]="snippets.provider" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Templates — pipe and directive"
    description="Two equivalent forms. Both are reactive: locale changes and lazy catalog loads propagate without a manual refresh."
  >
    <ngwr-doc-code [code]="snippets.pipe" language="html" />
    <ngwr-doc-code [code]="snippets.directive" language="html" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="From code"
    description="The service exposes both eager (`t()`) and reactive (`translate()`) lookups, plus `use()` to switch locales."
  >
    <ngwr-doc-code [code]="snippets.service" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Locale switcher"
    description="A tiny standalone component that lists every available locale and switches on click."
  >
    <ngwr-doc-code [code]="snippets.switcher" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-start">
        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap">
          @for (lc of available; track lc) {
            <button wr-btn type="button" [color]="locale() === lc ? 'primary' : null" (click)="use(lc)">
              {{ lc }}
            </button>
          }
        </div>
        <p style="margin: 0">
          <strong>Pipe:</strong> {{ 'app.title' | wrT }} — {{ 'app.hello' | wrT: { name: name() } }}
        </p>
        <p style="margin: 0">
          <strong>Directive:</strong>
          <span wrT="app.hello" [wrTParams]="{ name: name() }"></span>
        </p>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Catalog shape"
    description="Catalogs are JSON-shaped — nested or flat. Dotted keys walk the tree. Double-brace `name` placeholders interpolate at render time."
  >
    <ngwr-doc-code [code]="snippets.catalog" language="typescript" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="HTTP loader"
    description="When catalogs balloon, fetch them as JSON instead of bundling them — same templates, same service, different provider."
  >
    <ngwr-doc-code [code]="snippets.http" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Scopes — per-feature catalogs"
    description="A scope is a sub-catalog that loads lazily. Register it from a feature module / route. Scoped keys look up the scope first, then fall back to the root catalog."
  >
    <ngwr-doc-code [code]="snippets.scopes" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Missing-key handler"
    description="By default a missing key returns the key itself — typos surface immediately. In production, log them or swap in a localized fallback."
  >
    <ngwr-doc-code [code]="snippets.missing" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="API reference">
    <p style="margin: 0">Full API on the <a routerLink="/reference/services/i18n">WrI18n service page</a>.</p>
  </ngwr-doc-section>
</ngwr-doc-page>
