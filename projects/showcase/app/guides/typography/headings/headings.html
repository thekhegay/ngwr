<ngwr-doc-page
  title="Headings & display"
  description="The full heading ladder — display down to h6 — plus the oversized `display` variant for marketing hero rows."
  [keywords]="['typography', 'headings', 'display', 'h1', 'h2', 'h3']"
  [labels]="['Directive']"
>
  <ngwr-doc-section
    title="Scale"
    description="Eight semantic sizes covering hero displays through compact h6 section headers. Tokens come from `--wr-text-*` and `--wr-leading-*` so a theme override re-tunes the whole ladder."
  >
    <ngwr-doc-code [code]="snippets.scale" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; flex-direction: column; gap: 1rem; align-items: flex-start">
        <p wrTypography variant="display">Display</p>
        <p wrTypography variant="h1">Heading 1</p>
        <p wrTypography variant="h2">Heading 2</p>
        <p wrTypography variant="h3">Heading 3</p>
        <p wrTypography variant="h4">Heading 4</p>
        <p wrTypography variant="h5">Heading 5</p>
        <p wrTypography variant="h6">Heading 6</p>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Marketing pair"
    description="Common combination: overline tag → display headline → lead subhead. The overline picks up a tone for emphasis."
  >
    <ngwr-doc-code [code]="snippets.pair" language="angular-html" />
    <ngwr-doc-snippet code="">
      <div style="display: flex; flex-direction: column; gap: 0.5rem; max-width: 36rem">
        <p wrTypography variant="overline" tone="primary">Pricing</p>
        <p wrTypography variant="display">Built for every scale</p>
        <p wrTypography variant="lead" tone="medium">
          Start on the free tier and grow into a self-hosted seat the moment you outgrow it.
        </p>
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section
    title="See also"
    description="[`wrTypography` reference](/reference/directives/typography) — every input, the full variant union, and the classes the directive emits."
  />
</ngwr-doc-page>
