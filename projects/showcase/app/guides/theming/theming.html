<ngwr-doc-page
  title="Theming"
  description="ngwr is themed entirely with CSS custom properties — no SCSS rebuild required for most changes. Wire up the providers, load the stylesheet, and you get light + dark out of the box with a palette you can rebrand at compile time or at runtime."
  [keywords]="['theme', 'theming', 'dark mode', 'palette', 'rebrand', 'css variables']"
  [labels]="['Core']"
>
  <ngwr-doc-section
    title="Wire it up"
    description="Two providers: theme (mode + persistence) and density (spacing scale)."
  >
    <ngwr-doc-code [code]="snippets.provider" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Load the stylesheet"
    description="One umbrella for everything, or pick individual entry-points if you bundle by component."
  >
    <ngwr-doc-code [code]="snippets.styles" language="scss" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Light / dark / auto"
    description="`mode` is what the user picked. `resolved()` is what the DOM actually has — `auto` resolves through `prefers-color-scheme`. Writes `data-theme` on `<html>` and persists via WrStorage."
  >
    <ngwr-doc-snippet code="">
      <div style="display: flex; flex-direction: column; gap: 0.75rem; align-items: flex-start">
        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap">
          @for (m of modes; track m) {
            <button wr-btn type="button" [color]="mode() === m ? 'primary' : null" (click)="setMode(m)">
              {{ m }}
            </button>
          }
        </div>
        <p style="margin: 0">
          mode: <code>{{ mode() }}</code> · resolved: <code>{{ resolved() }}</code>
        </p>
      </div>
    </ngwr-doc-snippet>
    <ngwr-doc-code [code]="snippets.darkMode" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Rebrand — at compile time"
    description="Pass your hex values to the SCSS palette module before `@use 'ngwr'`. NGWR re-derives all variants (dark, darker, light, lighter, contrast)."
  >
    <ngwr-doc-code [code]="snippets.paletteScss" language="scss" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Rebrand — at runtime"
    description="Override the CSS variables on `:root` (or any subtree). Set both the base color and the `-rgb` channel — components use the channel for `rgba()` rings and tints."
  >
    <ngwr-doc-code [code]="snippets.paletteRoot" language="scss" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Per-component tokens"
    description="Every component also exposes its own scoped CSS variables (`--wr-btn-radius`, `--wr-tag-bg`, …). Override at the element level when you only need to nudge one widget."
  >
    <ngwr-doc-code [code]="snippets.component" language="scss" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Where to go next"
    description="Theming wires the system up; the tokens are catalogued one family per page. [Colors](/guides/tokens/colors) — intents, the soft set, semantic neutrals and how dark mode flips. [Sizing](/guides/tokens/sizing) — the control-sizing contract and the radius scale. [Typography](/guides/tokens/typography) — the type scale, families and weights. [Density](/guides/tokens/density) — the spacing scale, `provideWrDensity()` and the `[wrDensity]` subtree override. [Motion](/guides/tokens/motion) — easings, durations and the overlay timing hook."
  />

  <ngwr-doc-section
    title="See also"
    description="[`WrTheme` service reference](/reference/services/theme) — the full API behind the toggle above. [`WrDensity` service reference](/reference/services/density) — the density counterpart. [Icons](/icons) — registering icon sets, the adapters, and the `ng g ngwr:icon-set` schematic."
  />
</ngwr-doc-page>
