<ngwr-doc-page
  title="Tilt Card"
  description="Cursor-tracked 3D tilt. Use `<wr-tilt-card>` for a ready-made card host, or `[wrTilt]` to add the tilt behaviour to any element."
  [keywords]="['tilt-card', 'wr-tilt-card', 'wrTilt', 'parallax', '3d', 'animation']"
  [labels]="['Animation']"
>
  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Playground">
    <ngwr-doc-playground [code]="snippet()" [controls]="controls">
      <wr-tilt-card
        [maxTilt]="maxTilt()"
        [perspective]="perspective()"
        [scale]="scale()"
        [glare]="glare()"
        style="min-width: 18rem; max-width: 24rem"
      >
        <h3 style="margin: 0 0 0.25rem; font-size: 1.125rem">Hover me</h3>
        <p style="margin: 0; color: var(--wr-color-medium); font-size: 0.875rem">Move the cursor across me.</p>
      </wr-tilt-card>
    </ngwr-doc-playground>
  </ngwr-doc-section>

  <ngwr-doc-section title="Directive variant ([wrTilt])">
    <ngwr-doc-code [code]="snippets.directive" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <div
        wrTilt
        [maxTilt]="10"
        [scale]="1.04"
        style="
          padding: 2rem;
          background: linear-gradient(
            135deg,
            var(--wr-color-primary),
            var(--wr-color-secondary, var(--wr-color-primary))
          );
          color: var(--wr-color-white);
          border-radius: 0.75rem;
          font-weight: 600;
          text-align: center;
          will-change: transform;
        "
      >
        [wrTilt] on a plain &lt;div&gt; — same behaviour, no card chrome.
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
