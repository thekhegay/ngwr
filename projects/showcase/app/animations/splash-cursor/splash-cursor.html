<ngwr-doc-page
  title="Splash Cursor"
  description="WebGL fluid simulation that splashes colourful dye wherever the pointer moves or clicks. Fullscreen click-through overlay by default, or contained in any positioned box — where the dye collides with the walls. Renders nothing under prefers-reduced-motion or without WebGL."
  [keywords]="['splash-cursor', 'wr-splash-cursor', 'fluid', 'webgl', 'reactbits']"
  [labels]="['Animation']"
>
  <ngwr-reactbits-credit slug="splash-cursor" category="animations" />

  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Playground"
    description="Move the pointer through the box — the dye swirls and bounces off the walls. Flip the fullscreen toggle to let it follow you across the whole page instead."
  >
    <ngwr-doc-playground [code]="snippet()" [controls]="controls">
      <div
        style="
          position: relative;
          width: 100%;
          height: 22rem;
          border: 1px solid var(--wr-color-border);
          border-radius: 0.75rem;
          overflow: hidden;
          background: var(--wr-color-white);
        "
      >
        <wr-splash-cursor
          [fullscreen]="fullscreen()"
          [rainbow]="rainbow()"
          [color]="color()"
          [splatRadius]="splatRadius()"
          [curl]="curl()"
        />
        <p
          style="
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            margin: 0;
            color: var(--wr-color-dark);
            pointer-events: none;
          "
        >
          Move your mouse in here
        </p>
      </div>
    </ngwr-doc-playground>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
