<ngwr-doc-page
  title="Aurora"
  description="Animated aurora-style gradient backdrop. Use as a hero / section background."
  [keywords]="['aurora', 'wr-aurora', 'background', 'animation']"
  [labels]="['Animation']"
>
  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Playground">
    <ngwr-doc-playground [code]="snippet">
      <div style="position: relative; width: 100%; height: 12rem; border-radius: 0.75rem; overflow: hidden">
        <wr-aurora />
      </div>
    </ngwr-doc-playground>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
