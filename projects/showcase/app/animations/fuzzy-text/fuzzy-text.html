<ngwr-doc-page
  title="Fuzzy Text"
  description="Canvas-rendered fuzzy text — each row (or column) is offset by a random amount per frame for a TV-static or motion-blur look. Intensity ramps up on hover, click, and during periodic glitch bursts."
  [keywords]="['fuzzy-text', 'wr-fuzzy-text', 'text animation', 'reactbits']"
  [labels]="['Animation']"
>
  <ngwr-reactbits-credit slug="fuzzy-text" category="text-animations" />

  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Playground">
    <ngwr-doc-playground [code]="snippet()" [controls]="controls">
      <div
        style="
          padding: 2rem;
          background: var(--wr-color-white);
          border-radius: 0.75rem;
          display: flex;
          align-items: center;
          justify-content: center;
          width: 100%;
        "
      >
        <wr-fuzzy-text
          [text]="text()"
          [fuzzRange]="fuzzRange()"
          [baseIntensity]="baseIntensity()"
          [hoverIntensity]="hoverIntensity()"
          [direction]="direction()"
          [glitchMode]="glitchMode()"
        />
      </div>
    </ngwr-doc-playground>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
