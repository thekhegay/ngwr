<ngwr-doc-page

  [labels]="['Directive']"
>

    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />

    <ngwr-doc-snippet code="">
      <div
        wrSpotlight
        style="
          padding: 2rem;
          background: var(--wr-color-dark);
          color: var(--wr-color-white);
          border-radius: 0.75rem;

          text-align: center;
        "
      >
        Hover me — the cursor leaves a soft halo.
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>
