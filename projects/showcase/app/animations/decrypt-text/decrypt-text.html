<ngwr-doc-page
  title="Decrypt Text"
  description="Reveals a string by scrambling characters and progressively replacing scramble glyphs with the originals. Sequential reveal in three directions, or non-sequential settle after N iterations. Four trigger modes: hover, click, view, in-view + hover. Dependency-free port — signals + `setInterval`."
  [keywords]="['decrypt-text', 'wr-decrypt-text', 'text animation', 'reactbits']"
  [labels]="['Animation']"
>
  <ngwr-reactbits-credit slug="decrypted-text" category="text-animations" />

  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Hover (default)">
    <ngwr-doc-code [code]="snippets.hover" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-decrypt-text
        text="Hover to decrypt!"
        style="font-size: 1.5rem; font-weight: 700; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--wr-color-dark)"
      />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Sequential, from center, on viewport entry">
    <ngwr-doc-code [code]="snippets.sequentialCenter" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-decrypt-text
        text="Sequential from center"
        [sequential]="true"
        revealDirection="center"
        animateOn="view"
        style="font-size: 1.5rem; font-weight: 700; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--wr-color-primary)"
      />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Click to toggle">
    <ngwr-doc-code [code]="snippets.clickToggle" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-decrypt-text
        text="Click to toggle encrypted state"
        animateOn="click"
        clickMode="toggle"
        style="font-size: 1.25rem; font-weight: 700; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--wr-color-dark); cursor: pointer"
      />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Scramble using only original characters">
    <ngwr-doc-code [code]="snippets.onlyOriginalChars" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-decrypt-text
        text="ONLY ORIGINAL CHARS"
        [sequential]="true"
        [useOriginalCharsOnly]="true"
        animateOn="view"
        style="font-size: 1.5rem; font-weight: 700; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--wr-color-dark)"
      />
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
