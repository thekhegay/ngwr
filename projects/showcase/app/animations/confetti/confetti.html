<ngwr-doc-page
  title="Confetti"
  description="Imperative confetti service. Inject `WrConfetti` and call `.fire()` on a celebration event."
  [keywords]="['confetti', 'WrConfetti']"
  [labels]="['Effect', 'Service']"
>
  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Playground">
    <ngwr-doc-playground
      [code]="snippet()"
      language="angular-ts"
      [controls]="controls"
      [showReplay]="true"
      (replay)="fire()"
    >
      <button
        type="button"
        (click)="fire()"
        style="padding: 0.5rem 1rem; border: 1px solid var(--wr-color-light); border-radius: 0.375rem; cursor: pointer"
      >
        Fire confetti
      </button>
    </ngwr-doc-playground>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
