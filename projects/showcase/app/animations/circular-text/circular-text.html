<ngwr-doc-page
  title="Circular Text"
  description="Text laid out around a circle, with the whole circle spinning on a keyframe. Hover behaviour swaps the spin rate (or pauses) without resetting the rotation angle. Pure CSS port — no JS animation loop."
  [keywords]="['circular-text', 'wr-circular-text', 'text animation', 'reactbits']"
  [labels]="['Animation']"
>
  <ngwr-reactbits-credit slug="circular-text" category="text-animations" />

  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Playground">
    <ngwr-doc-playground [code]="snippet()" [controls]="controls">
      <div style="display: flex; justify-content: center; padding: 1rem; width: 100%">
        <wr-circular-text
          [text]="text()"
          [spinDuration]="spinDuration()"
          [onHover]="onHover()"
          style="font-size: 1.25rem; color: var(--wr-color-dark)"
        />
      </div>
    </ngwr-doc-playground>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
