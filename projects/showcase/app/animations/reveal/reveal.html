<ngwr-doc-page
  title="wrReveal"
  description="IntersectionObserver-driven enter animation. Adds `.wr-reveal--visible` once the host crosses the viewport threshold. Pair with `@use 'ngwr/animations';` for the default fade-and-slide-up styles."
  [keywords]="['wrReveal', 'reveal', 'intersection observer', 'directive']"
  [labels]="['Directive']"
>
  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Playground">
    <ngwr-doc-playground [code]="snippet()" [controls]="controls" [showReplay]="true" (replay)="replay()">
      <div style="display: flex; flex-direction: column; gap: 0.75rem; width: 100%">
        <p style="margin: 0">Scroll inside the box below to bring the target into view and trigger the reveal.</p>
        <div
          #scroll
          style="
            height: 18rem;
            overflow-y: auto;
            border: 1px solid var(--wr-color-light);
            border-radius: 0.5rem;
            background: var(--wr-color-white);
            color: var(--wr-color-dark);
          "
        >
          @for (k of [replayKey()]; track k) {
            <div style="display: flex; flex-direction: column; align-items: center; padding: 1rem">
              <!-- Spacer keeps the reveal target below the fold of the scroll box. -->
              <div
                style="
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  height: 22rem;
                  color: rgba(var(--wr-color-dark-rgb), 0.45);
                  font-size: 0.8125rem;
                "
              >
                ↓ Keep scrolling ↓
              </div>
              <div
                wrReveal
                [root]="scroll"
                [threshold]="threshold()"
                [rootMargin]="rootMargin()"
                [once]="once()"
                style="
                  padding: 1rem;
                  background: rgba(var(--wr-color-primary-rgb), 0.08);
                  border: 1px solid var(--wr-color-primary);
                  border-radius: 0.5rem;
                  color: var(--wr-color-primary);
                  font-weight: 600;
                "
              >
                Hello! I faded in.
              </div>
              <div style="height: 6rem"></div>
            </div>
          }
        </div>
      </div>
    </ngwr-doc-playground>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
