<ngwr-doc-page
  title="Click Spark"
  description="Click ripple. Bursts a ring of short line sparks from the click point across any projected content. The canvas overlay has `pointer-events: none`, so projected DOM stays fully interactive."
  [keywords]="['click-spark', 'wr-click-spark', 'reactbits']"
  [labels]="['Animation']"
>
  <ngwr-reactbits-credit slug="click-spark" />

  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Playground">
    <ngwr-doc-playground [code]="snippet()" [controls]="controls">
      <wr-click-spark
        [sparkColor]="sparkColor()"
        [sparkCount]="sparkCount()"
        [sparkRadius]="sparkRadius()"
        [sparkSize]="sparkSize()"
        [duration]="duration()"
        [easing]="easing()"
        style="
          display: flex;
          width: 100%;
          min-height: 12rem;
          background: var(--wr-color-white);
          color: var(--wr-color-dark);
          border: 1px solid var(--wr-color-border);
          border-radius: 0.75rem;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          font-weight: 600;
        "
      >
        Click anywhere
      </wr-click-spark>
    </ngwr-doc-playground>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
