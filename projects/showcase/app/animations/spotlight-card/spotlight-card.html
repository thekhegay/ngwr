<ngwr-doc-page
  title="Spotlight Card"
  description="Cursor-tracked spotlight card. A soft radial highlight follows the pointer, fading in on hover."
  [keywords]="['spotlight-card', 'wr-spotlight-card', 'reactbits']"
  [labels]="['Animation']"
>
  <ngwr-reactbits-credit slug="spotlight-card" category="components" />

  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Basic">
    <ngwr-doc-code [code]="snippets.basic" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-spotlight-card style="min-width: 18rem; max-width: 24rem">
        <h3 style="margin: 0 0 0.25rem; font-size: 1.125rem">Cursor-tracked spotlight</h3>
        <p style="margin: 0; color: rgba(255, 255, 255, 0.7); font-size: 0.875rem">Move the pointer across this card.</p>
      </wr-spotlight-card>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="Custom colour">
    <ngwr-doc-code [code]="snippets.color" language="angular-html" />
    <ngwr-doc-snippet code="">
      <wr-spotlight-card spotlightColor="rgba(120, 180, 255, 0.35)" style="min-width: 18rem; max-width: 24rem">
        <h3 style="margin: 0 0 0.25rem; font-size: 1.125rem">Blue spotlight</h3>
        <p style="margin: 0; color: rgba(255, 255, 255, 0.7); font-size: 0.875rem">Pass any CSS colour.</p>
      </wr-spotlight-card>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
