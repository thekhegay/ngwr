<ngwr-doc-page
  title="Spotlight Card"
  description="Cursor-tracked spotlight card. A soft radial highlight follows the pointer, fading in on hover."
  [keywords]="['spotlight-card', 'wr-spotlight-card', 'reactbits']"
  [labels]="['Animation']"
>
  <ngwr-reactbits-credit slug="spotlight-card" category="components" />

  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Playground">
    <ngwr-doc-playground [code]="snippet()" [controls]="controls">
      <wr-spotlight-card [spotlightColor]="spotlightColor()" style="min-width: 18rem; max-width: 24rem">
        <h3 style="margin: 0 0 0.25rem; font-size: 1.125rem">Cursor-tracked spotlight</h3>
        <p style="margin: 0; color: rgba(255, 255, 255, 0.7); font-size: 0.875rem">
          Move the pointer across this card.
        </p>
      </wr-spotlight-card>
    </ngwr-doc-playground>
  </ngwr-doc-section>

  <ngwr-doc-section title="Directive variant ([wrSpotlight])">
    <ngwr-doc-code [code]="snippets.directive" language="angular-ts" />
    <ngwr-doc-snippet code="">
      <div
        wrSpotlight
        style="
          padding: 2rem;
          background:
            radial-gradient(
              400px circle at var(--wr-spotlight-x, 50%) var(--wr-spotlight-y, 50%),
              rgba(var(--wr-color-primary-rgb), 0.18),
              transparent 60%
            ),
            var(--wr-color-dark);
          color: var(--wr-color-white);
          border-radius: 0.75rem;
          font-weight: 600;
          text-align: center;
        "
      >
        Hover me — [wrSpotlight] writes CSS vars; the gradient does the rest.
      </div>
    </ngwr-doc-snippet>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
