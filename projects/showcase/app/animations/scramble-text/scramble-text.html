<ngwr-doc-page
  title="Scramble Text"
  description="Cursor-proximity scrambler. Each character within `radius` px of the pointer scrambles through `scrambleChars` then settles back. Closer pointer means longer scramble. Dependency-free port — vanilla DOM split + per-char `setInterval` loop."
  [keywords]="['scramble-text', 'wr-scramble-text', 'text animation', 'reactbits']"
  [labels]="['Animation']"
>
  <ngwr-reactbits-credit slug="scrambled-text" category="text-animations" />

  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Playground">
    <ngwr-doc-playground [code]="snippet()" [controls]="controls">
      <wr-scramble-text
        [radius]="radius()"
        [duration]="duration()"
        [speed]="speed()"
        [scrambleChars]="scrambleChars()"
        style="
          display: block;
          padding: 1.5rem;
          background: var(--wr-color-dark);
          color: var(--wr-color-white);
          border-radius: 0.75rem;
          font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
          font-size: 1.125rem;
          line-height: 1.6;
          max-width: 36rem;
        "
      >
        Hover this paragraph to scramble characters near the cursor.
      </wr-scramble-text>
    </ngwr-doc-playground>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
