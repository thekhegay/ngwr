<ngwr-doc-page
  title="Border Glow"
  description="Cursor-tracked glowing border card. A cone of light follows the pointer along the perimeter, brightening as the cursor approaches an edge. Optional `[animated]` mode plays a one-shot sweep on mount."
  [keywords]="['border-glow', 'wr-border-glow', 'glow', 'card', 'reactbits']"
  [labels]="['Animation']"
>
  <ngwr-reactbits-credit slug="border-glow" category="components" />

  <ngwr-doc-section title="Import">
    <ngwr-doc-code [code]="snippets.install" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Playground">
    <ngwr-doc-playground [code]="snippet()" [controls]="controls">
      <wr-border-glow
        [glowColor]="glowColor()"
        [borderRadius]="borderRadius()"
        [glowRadius]="glowRadius()"
        [coneSpread]="coneSpread()"
        [glowIntensity]="glowIntensity()"
        [animated]="animated()"
        style="min-width: 18rem"
      >
        <div style="padding: 1.5rem 1.75rem; color: white">
          <h3 style="margin: 0 0 0.25rem; font-size: 1.125rem">Hover me</h3>
          <p style="margin: 0; color: rgba(255, 255, 255, 0.7); font-size: 0.875rem">
            The border lights up where the cursor is.
          </p>
        </div>
      </wr-border-glow>
    </ngwr-doc-playground>
  </ngwr-doc-section>

  <ngwr-doc-section title="API">
    <ngwr-doc-api [rows]="api" />
  </ngwr-doc-section>
</ngwr-doc-page>
