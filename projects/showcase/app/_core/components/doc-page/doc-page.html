<header class="header">
  @if (labels().length) {
    <div class="labels">
      @for (label of labels(); track label) {
        <span class="label">{{ label }}</span>
      }
    </div>
  }

  <h1 class="title">{{ title() }}</h1>

  @if (description(); as d) {
    <p class="description">{{ d }}</p>
  }
</header>

<div class="content">
  <ng-content />
</div>
