<header class="ngwr-doc-page__header">
  @if (labels().length) {
    <div class="ngwr-doc-page__labels">
      @for (label of labels(); track label) {
        <span class="ngwr-doc-page__label">{{ label }}</span>
      }
    </div>
  }

  <h1 class="ngwr-doc-page__title">{{ title() }}</h1>

  @if (description(); as d) {
    <p class="ngwr-doc-page__description">{{ d }}</p>
  }
</header>

<div class="ngwr-doc-page__content">
  <ng-content />
</div>
