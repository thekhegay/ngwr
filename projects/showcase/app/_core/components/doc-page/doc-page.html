<header class="header">
  @if (labels().length) {
    <div class="labels">
      @for (label of labels(); track label) {
        <wr-badge size="sm" shape="pill" [color]="labelColor(label)">{{ label }}</wr-badge>
      }
    </div>
  }

  <h1 wrTypography variant="h3" class="title">{{ title() }}</h1>

  @if (description(); as d) {
    <p wrTypography variant="body" tone="medium" class="description" [innerHTML]="d | wrDocRich"></p>
  }
</header>

<div class="content">
  <ng-content />
</div>
