@if (tabs().length > 0) {
  @if (tabs().length > 1) {
    <div class="tabs" role="tablist">
      @for (t of tabs(); track t.label) {
        <button
          type="button"
          class="tabs__btn"
          role="tab"
          [class.tabs__btn--active]="$index === activeIndex()"
          [attr.aria-selected]="$index === activeIndex()"
          (click)="select($index)"
        >
          {{ t.label }}
        </button>
      }
    </div>
  }

  @if (lastHtml(); as html) {
    <div class="html" [innerHTML]="html"></div>
  } @else {
    <pre class="fallback"><code>{{ normalized() }}</code></pre>
  }

  <button type="button" class="copy" (click)="copy()" [attr.aria-label]="copied() ? 'Copied' : 'Copy'">
    <wr-icon [name]="copied() ? 'check' : 'copy'" />
  </button>
}
