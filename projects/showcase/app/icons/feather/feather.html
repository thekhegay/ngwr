<ngwr-doc-page
  title="Feather"
  description="The original minimal 24px stroke set. ~285 icons. Click any tile to copy the import snippet."
  [keywords]="['icons', 'feather']"
  [labels]="['Adapter', 'MIT']"
>
  <ngwr-doc-section title="Install">
    <ngwr-doc-code [code]="install" language="bash" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Wire icons"
    description="Use the `feather` / `featherIcons` adapter from `ngwr/icon/adapters/feather`. Feather ships its icons as a single JSON file — pluck the SVG strings you need."
  >
    <ngwr-doc-code [code]="usage" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Browse the catalog">
    <ngwr-icon-grid [icons]="icons()" [snippetFor]="snippetFor" />
  </ngwr-doc-section>
</ngwr-doc-page>
