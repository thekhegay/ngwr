<ngwr-doc-page
  title="Lucide"
  description="A modern, community-maintained Feather fork. ~1700 24px stroke icons. Click any tile to copy the import snippet."
  [keywords]="['icons', 'lucide']"
  [labels]="['Adapter', 'ISC']"
>
  <ngwr-doc-section title="Install">
    <ngwr-doc-code [code]="install" language="bash" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Wire icons"
    description="Use the `lucide` / `lucideIcons` adapter from `ngwr/icon/adapters/lucide`. Tree-shakes per icon — only what you import ships."
  >
    <ngwr-doc-code [code]="usage" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Browse the catalog">
    <ngwr-icon-grid [icons]="icons()" [snippetFor]="snippetFor" />
  </ngwr-doc-section>
</ngwr-doc-page>
