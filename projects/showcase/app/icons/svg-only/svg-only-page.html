<ngwr-doc-page
  [title]="spec().title"
  [description]="spec().description"
  [keywords]="['icons', spec().title.toLowerCase()]"
  [labels]="['svgIcon()', 'MIT']"
>
  <ngwr-doc-section title="Install">
    <ngwr-doc-code [code]="spec().install" language="bash" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Wire icons"
    description="Use the generic `svgIcon()` helper. The bundler-specific `?raw` suffix (Vite) returns the SVG file as a string — adjust for your bundler (`raw-loader` for Webpack, `--loader:.svg=text` for esbuild)."
  >
    <ngwr-doc-code [code]="spec().imports.ts" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section title="Browse the catalog">
    <p style="margin: 0">
      The full catalog lives upstream at
      <a [href]="spec().homepage" target="_blank" rel="noopener noreferrer">{{ spec().homepage }}</a
      >. Copy any icon's name and inline it via the snippet above.
    </p>
  </ngwr-doc-section>
</ngwr-doc-page>
