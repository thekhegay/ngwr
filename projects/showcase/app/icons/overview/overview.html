<ngwr-doc-page
  title="Icons"
  description="ngwr ships a registry-based icon system. Bring any icon set you like — install the upstream package separately, then wire icons via `provideWrIcons()`. The library bundles no upstream icons of its own."
  [keywords]="['icons', 'icon-set', 'lucide', 'feather', 'tabler', 'phosphor', 'heroicons']"
  [labels]="['Reference']"
>
  <ngwr-doc-section
    title="The shape"
    description="Everything resolves to a `WrIconDef` — `{ name: string, data: string }` where `data` is a full `<svg>…</svg>` string. Register one or more via `provideWrIcons(...)` and reference by `name` from any `<wr-icon>` instance."
  >
    <ngwr-doc-code [code]="snippets.register" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Pattern 1 — svgIcon() for raw SVG files"
    description="The default path. Bundle the SVG as a string via your bundler's raw import, hand it to `svgIcon()`. Works with every set that ships SVG files — Tabler, Phosphor, Heroicons, Iconoir, Radix, Bootstrap, and any random icons your designer hands you."
  >
    <ngwr-doc-code [code]="snippets.svgIcon" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Pattern 2 — Lucide adapter"
    description="Lucide doesn't ship SVG files — it exports per-icon IconNode tuples. The `ngwr/icon/adapters/lucide` adapter renders them into the same `WrIconDef` shape."
  >
    <ngwr-doc-code [code]="snippets.lucide" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Pattern 3 — Feather adapter"
    description="Feather ships inner-SVG strings only. The adapter wraps each with Feather's default `<svg>` chrome (24×24, currentColor, stroke 2)."
  >
    <ngwr-doc-code [code]="snippets.feather" language="angular-ts" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="Scaffold with the schematic"
    description="Faster path for the common case — let the CLI write the boilerplate."
  >
    <ngwr-doc-code [code]="snippets.schematic" language="bash" />
  </ngwr-doc-section>

  <ngwr-doc-section
    title="See also"
    description="[`<wr-icon>` component reference](/reference/components/icon) — the renderer side. [`ng g ngwr:icon-set` schematic](/start/schematics) — the generator side. [`<wr-icon>` integration with components](/reference/components/icon) — where to use the registry."
  />
</ngwr-doc-page>
