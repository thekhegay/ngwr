<button
  type="button"
  class="wr-collapse__header"
  [attr.aria-expanded]="open()"
  [attr.aria-controls]="bodyId"
  [disabled]="disabled()"
  (click)="toggle()"
>
  <span class="wr-collapse__title">{{ title() }}</span>
  <svg
    class="wr-icon__svg wr-collapse__chevron"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    aria-hidden="true"
  >
    <path d="m6 9 6 6 6-6" />
  </svg>
</button>

<div
  class="wr-collapse__body"
  [attr.id]="bodyId"
  [class.wr-collapse__body--open]="open()"
  [attr.aria-hidden]="!open()"
  [attr.inert]="!open() ? '' : null"
>
  <div class="wr-collapse__content">
    <div class="wr-collapse__inner">
      <ng-content />
    </div>
  </div>
</div>
