<div class="wr-toast__body">
  @if (title(); as text) {
    <p class="wr-toast__title">{{ text }}</p>
  }
  <p class="wr-toast__message">{{ message() }}</p>
</div>

<div class="wr-toast__actions">
  @if (showCopy()) {
    <button
      type="button"
      class="wr-toast__action"
      [attr.aria-label]="justCopied() ? labels().copied : labels().copy"
      [title]="justCopied() ? labels().copied : labels().copy"
      (click)="onCopy()"
    >
      @if (justCopied()) {
        <svg
          class="wr-icon__svg"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M20 6 9 17l-5-5" />
        </svg>
      } @else {
        <svg
          class="wr-icon__svg"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
          <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
        </svg>
      }
    </button>
  }

  @if (dismissible()) {
    <button
      type="button"
      class="wr-toast__action"
      [attr.aria-label]="labels().close"
      [title]="labels().close"
      (click)="dismissed.emit()"
    >
      <svg
        class="wr-icon__svg"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M18 6 6 18" />
        <path d="m6 6 12 12" />
      </svg>
    </button>
  }
</div>

@if (progressVisible()) {
  <span class="wr-toast__progress" aria-hidden="true"></span>
}
