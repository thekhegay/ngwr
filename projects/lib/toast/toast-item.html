<div class="wr-toast__body">
  @if (title(); as text) {
    <p class="wr-toast__title">{{ text }}</p>
  }
  <p class="wr-toast__message">{{ message() }}</p>
</div>

<div class="wr-toast__actions">
  @if (showCopy()) {
    <button
      type="button"
      class="wr-toast__action"
      [attr.aria-label]="justCopied() ? labels().copied : labels().copy"
      [title]="justCopied() ? labels().copied : labels().copy"
      (click)="onCopy()"
    >
      @if (justCopied()) {
        <svg class="wr-icon__svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" aria-hidden="true">
          <path
            fill="currentColor"
            d="M124.1 21.3c5.2 5.2 5.2 13.7 0 18.9L72.7 91.7l-18.9 18.9-19-18.9-30.9-31c-5.2-5.2-5.2-13.7 0-18.9s13.7-5.2 18.9 0l30.9 30.9 51.4-51.4c5.3-5.2 13.8-5.2 19 0"
          />
        </svg>
      } @else {
        <svg class="wr-icon__svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" aria-hidden="true">
          <path
            fill="currentColor"
            d="M120.1 36.6c-7.9-7.9-20-7.9-41.7-7.9s-33.8 0-41.7 7.9-7.9 20-7.9 41.7 0 33.8 7.9 41.7 20 7.9 41.7 7.9 33.8 0 41.7-7.9 7.9-20 7.9-41.7 0-33.8-7.9-41.7"
          />
          <path
            fill="currentColor"
            d="M20.6 78.4c0-25.3 0-39.4 9.2-48.6s23.3-9.2 48.6-9.2c7.4 0 13.8 0 19.5.2-1.1-5.4-3-9.5-6.4-12.9C83.5 0 71.4 0 49.6 0S15.8 0 7.9 7.9 0 27.9 0 49.6s0 33.8 7.9 41.7c3.4 3.4 7.6 5.3 12.9 6.4-.2-5.5-.2-12-.2-19.3"
          />
        </svg>
      }
    </button>
  }

  @if (dismissible()) {
    <button
      type="button"
      class="wr-toast__action"
      [attr.aria-label]="labels().close"
      [title]="labels().close"
      (click)="dismissed.emit()"
    >
      <svg class="wr-icon__svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" aria-hidden="true">
        <path
          fill="currentColor"
          d="M73 64.1 93.2 44c2.5-2.5 2.5-6.6 0-9.1s-6.6-2.5-9.1 0L64 55.1 43.8 34.9c-2.5-2.5-6.6-2.5-9.1 0s-2.5 6.6 0 9.1l20.2 20.2-20.1 20c-2.5 2.5-2.5 6.6 0 9.1s6.6 2.5 9.1 0L64 73.2l20 20.1c2.5 2.5 6.6 2.5 9.1 0s2.5-6.6 0-9.1z"
        />
      </svg>
    </button>
  }
</div>

@if (progressVisible()) {
  <span class="wr-toast__progress" aria-hidden="true"></span>
}
