<div class="wr-color-picker__sv" (pointerdown)="onPointerDown($event, 'sv')">
  <span class="wr-color-picker__thumb" [style.left.%]="svThumbX()" [style.top.%]="svThumbY()"></span>
</div>

<div class="wr-color-picker__slider wr-color-picker__slider--hue" (pointerdown)="onPointerDown($event, 'hue')">
  <span class="wr-color-picker__thumb wr-color-picker__thumb--slider" [style.left.%]="hueThumbX()"></span>
</div>

@if (alpha()) {
  <div class="wr-color-picker__slider wr-color-picker__slider--alpha" (pointerdown)="onPointerDown($event, 'alpha')">
    <span class="wr-color-picker__thumb wr-color-picker__thumb--slider" [style.left.%]="alphaThumbX()"></span>
  </div>
}

<div class="wr-color-picker__chrome">
  <span class="wr-color-picker__preview" [style.background]="hex()"></span>
  <wr-segmented
    class="wr-color-picker__tabs"
    [options]="tabOptions"
    [value]="activeTab()"
    (valueChange)="onTabChange($event)"
  />
</div>

@switch (activeTab()) {
  @case ('hex') {
    <div class="wr-color-picker__inputs wr-color-picker__inputs--hex">
      <label class="wr-color-picker__field wr-color-picker__field--wide">
        <input
          type="text"
          spellcheck="false"
          autocomplete="off"
          [value]="hexInput()"
          [disabled]="disabled()"
          (input)="onHexInput($event)"
          (blur)="onHexBlur()"
        />
        <span class="wr-color-picker__field-label">HEX</span>
      </label>
    </div>
  }
  @case ('rgb') {
    <div class="wr-color-picker__inputs">
      <label class="wr-color-picker__field">
        <input
          type="number"
          min="0"
          max="255"
          [value]="rgb().r"
          [disabled]="disabled()"
          (input)="onRgbChannel('r', $event)"
        />
        <span class="wr-color-picker__field-label">R</span>
      </label>
      <label class="wr-color-picker__field">
        <input
          type="number"
          min="0"
          max="255"
          [value]="rgb().g"
          [disabled]="disabled()"
          (input)="onRgbChannel('g', $event)"
        />
        <span class="wr-color-picker__field-label">G</span>
      </label>
      <label class="wr-color-picker__field">
        <input
          type="number"
          min="0"
          max="255"
          [value]="rgb().b"
          [disabled]="disabled()"
          (input)="onRgbChannel('b', $event)"
        />
        <span class="wr-color-picker__field-label">B</span>
      </label>
      @if (alpha()) {
        <label class="wr-color-picker__field">
          <input
            type="number"
            min="0"
            max="100"
            [value]="alphaPercent()"
            [disabled]="disabled()"
            (input)="onAlphaPercent($event)"
          />
          <span class="wr-color-picker__field-label">A%</span>
        </label>
      }
    </div>
  }
  @case ('hsl') {
    <div class="wr-color-picker__inputs">
      <label class="wr-color-picker__field">
        <input
          type="number"
          min="0"
          max="360"
          [value]="hslView().h | number: '1.0-0'"
          [disabled]="disabled()"
          (input)="onHslChannel('h', $event)"
        />
        <span class="wr-color-picker__field-label">H</span>
      </label>
      <label class="wr-color-picker__field">
        <input
          type="number"
          min="0"
          max="100"
          [value]="hslView().s * 100 | number: '1.0-0'"
          [disabled]="disabled()"
          (input)="onHslChannel('s', $event)"
        />
        <span class="wr-color-picker__field-label">S%</span>
      </label>
      <label class="wr-color-picker__field">
        <input
          type="number"
          min="0"
          max="100"
          [value]="hslView().l * 100 | number: '1.0-0'"
          [disabled]="disabled()"
          (input)="onHslChannel('l', $event)"
        />
        <span class="wr-color-picker__field-label">L%</span>
      </label>
      @if (alpha()) {
        <label class="wr-color-picker__field">
          <input
            type="number"
            min="0"
            max="100"
            [value]="alphaPercent()"
            [disabled]="disabled()"
            (input)="onAlphaPercent($event)"
          />
          <span class="wr-color-picker__field-label">A%</span>
        </label>
      }
    </div>
  }
}

@if (swatches().length > 0) {
  <div class="wr-color-picker__swatches">
    @for (color of swatches(); track color) {
      <button
        type="button"
        class="wr-color-picker__swatch"
        [style.background]="color"
        [attr.aria-label]="color"
        [disabled]="disabled()"
        (click)="onSwatchClick(color)"
      ></button>
    }
  </div>
}
