<button
  type="button"
  class="wr-input-group__toggle"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-pressed]="revealed()"
  (click)="toggle()"
>
  @if (revealed()) {
    <svg class="wr-icon__svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" aria-hidden="true">
      <path
        fill="none"
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="4"
        d="M19 10.85c1.53-.54 3.2-.85 5-.85 12 0 18 14 18 14s-1 2.33-3 5.09M13.54 14C8.51 18.14 6 24 6 24s6 14 18 14c4 0 7.33-1.56 10-3.63M8 8l32 32M20.46 20.46c-.9.9-1.46 2.15-1.46 3.54 0 2.76 2.24 5 5 5 1.38 0 2.63-.56 3.54-1.46"
      />
    </svg>
  } @else {
    <svg class="wr-icon__svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" aria-hidden="true">
      <circle
        cx="24"
        cy="24"
        r="5"
        fill="none"
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="4"
      />
      <path
        fill="none"
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="4"
        d="M6 24s6 14 18 14 18-14 18-14-6-14-18-14S6 24 6 24"
      />
    </svg>
  }
</button>
