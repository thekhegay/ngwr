@if (icon()) {
  <wr-icon class="wr-context-menu-item__icon" [name]="$any(icon())" size="14" />
}
<span class="wr-context-menu-item__label"><ng-content /></span>
@if (submenu()) {
  <svg
    class="wr-icon__svg wr-context-menu-item__chevron"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    aria-hidden="true"
  >
    <path d="m9 18 6-6-6-6" />
  </svg>
}
