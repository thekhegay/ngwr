<div class="wr-time-picker__col">
  <button
    type="button"
    class="wr-time-picker__step wr-time-picker__step--up"
    aria-label="Increment hours"
    [disabled]="!interactive()"
    (click)="stepHours(1)"
  >
    <svg
      class="wr-time-picker__chevron"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <path d="m18 15-6-6-6 6" />
    </svg>
  </button>
  <input
    class="wr-time-picker__input"
    type="text"
    inputmode="numeric"
    aria-label="Hours"
    [value]="hoursDisplay()"
    [disabled]="effectiveDisabled()"
    [readonly]="readonly()"
    (input)="onHoursInput($event)"
    (blur)="onBlur()"
  />
  <button
    type="button"
    class="wr-time-picker__step wr-time-picker__step--down"
    aria-label="Decrement hours"
    [disabled]="!interactive()"
    (click)="stepHours(-1)"
  >
    <svg
      class="wr-time-picker__chevron"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <path d="m6 9 6 6 6-6" />
    </svg>
  </button>
</div>

<span class="wr-time-picker__sep" aria-hidden="true">:</span>

  <div class="wr-time-picker__col">

      class="wr-time-picker__step wr-time-picker__step--up"
      aria-label="Increment seconds"
      [disabled]="!interactive()"
      (click)="stepSeconds(1)"
    >
      <svg
        class="wr-time-picker__chevron"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="m18 15-6-6-6 6" />
      </svg>
    </button>
    <input
      class="wr-time-picker__input"
      type="text"
      inputmode="numeric"
      aria-label="Seconds"
      [value]="secondsDisplay()"
      [disabled]="effectiveDisabled()"
      [readonly]="readonly()"
      (input)="onSecondsInput($event)"
      (blur)="onBlur()"

      class="wr-time-picker__step wr-time-picker__step--down"
      aria-label="Decrement seconds"
      [disabled]="!interactive()"
      (click)="stepSeconds(-1)"
    >
      <svg

        viewBox="0 0 24 24"
        fill="none"

        stroke-linecap="round"

@if (is12h()) {
  <div class="wr-time-picker__col wr-time-picker__col--ampm">
    <button
      type="button"
      class="wr-time-picker__step wr-time-picker__step--up"
      aria-label="Toggle AM / PM"
      [disabled]="!interactive()"
      (click)="toggleAmPm()"
    >
      <svg
        class="wr-time-picker__chevron"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="m18 15-6-6-6 6" />
      </svg>
    </button>
    <span class="wr-time-picker__label" aria-live="polite">{{ amPmLabel() }}</span>
    <button
      type="button"
      class="wr-time-picker__step wr-time-picker__step--down"
      aria-label="Toggle AM / PM"
      [disabled]="!interactive()"
      (click)="toggleAmPm()"
    >
      <svg
        class="wr-time-picker__chevron"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="m6 9 6 6 6-6" />
      </svg>
    </button>
  </div>
}
