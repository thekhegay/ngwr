@if (!dismissed()) {
  <div class="wr-alert__body">
    <p class="wr-alert__title">{{ title() }}</p>
    @if (message(); as text) {
      <p class="wr-alert__message">{{ text }}</p>
    }
  </div>

  @if (closeable()) {
    <button type="button" class="wr-alert__close" aria-label="Close alert" (click)="onClose()">
      <svg
        class="wr-icon__svg"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M18 6 6 18" />
        <path d="m6 6 12 12" />
      </svg>
    </button>
  }
}
