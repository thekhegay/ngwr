@if (!dismissed()) {
  @if (iconName(); as n) {
    <wr-icon class="wr-alert__icon" [name]="n" />
  } @else if (icon()) {
    <svg
      class="wr-alert__icon"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      @switch (type()) {
        @case ('success') {
          <path d="M21.801 10A10 10 0 1 1 17 3.335" />
          <path d="m9 11 3 3L22 4" />
        }
        @case ('warning') {
          <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3" />
          <path d="M12 9v4" />
          <path d="M12 17h.01" />
        }
        @case ('danger') {
          <circle cx="12" cy="12" r="10" />
          <path d="M12 8v4" />
          <path d="M12 16h.01" />
        }
        @case ('neutral') {
          <circle cx="12" cy="12" r="10" />
          <path d="M12 8v4" />
          <path d="M12 16h.01" />
        }
        @case ('offline') {
          <circle cx="12" cy="12" r="10" />
          <path d="m4.9 4.9 14.2 14.2" />
        }
        @default {
          <circle cx="12" cy="12" r="10" />
          <path d="M12 16v-4" />
          <path d="M12 8h.01" />
        }
      }
    </svg>
  }

  <div class="wr-alert__body">
    @if (title(); as t) {
      <p class="wr-alert__title">{{ t }}</p>
      @if (message(); as m) {
        <p class="wr-alert__message">{{ m }}</p>
      }
    } @else if (message(); as m) {
      <p class="wr-alert__title">{{ m }}</p>
    }
  </div>

  @if (closeable()) {
    <button type="button" class="wr-alert__close" aria-label="Close alert" (click)="onClose()">
      <svg
        class="wr-icon__svg"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M18 6 6 18" />
        <path d="m6 6 12 12" />
      </svg>
    </button>
  }
}
