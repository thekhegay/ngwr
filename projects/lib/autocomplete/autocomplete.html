<wr-input-group>
  <input
    #input
    wrInput
    type="text"
    autocomplete="off"
    spellcheck="false"
    role="combobox"
    aria-autocomplete="list"
    [attr.aria-controls]="listboxId"
    [attr.aria-expanded]="open()"
    [attr.aria-activedescendant]="activeId()"
    [value]="text()"
    [placeholder]="placeholder()"
    [disabled]="effectiveDisabled()"
    [readonly]="readonly()"
    (focus)="onFocus()"
    (input)="onInput($event)"
    (blur)="onBlur()"
    (keydown)="onKeydown($event)"
  />
  <button
    type="button"
    wrInputSuffix
    class="wr-autocomplete__trigger"
    tabindex="-1"
    aria-label="Toggle suggestions"
    [disabled]="effectiveDisabled()"
    (click)="toggleOverlay()"
  >
    <svg width="10" height="6" viewBox="0 0 10 6" aria-hidden="true">
      <path d="M0 0 L5 6 L10 0 Z" fill="currentColor" />
    </svg>
  </button>
</wr-input-group>

<ng-template #panelTpl>
  <div class="wr-autocomplete__panel" role="listbox" [id]="listboxId" [style.width.px]="panelWidth()">
    @if (loading()) {
      <div class="wr-autocomplete__loading" aria-busy="true">{{ loadingText() }}</div>
    } @else if (filtered().length === 0) {
      <div class="wr-autocomplete__empty">{{ noResultsText() }}</div>
    } @else if (virtualScroll()) {
      <cdk-virtual-scroll-viewport
        class="wr-autocomplete__viewport"
        [itemSize]="itemSize()"
        [minBufferPx]="itemSize() * 4"
        [maxBufferPx]="itemSize() * 8"
        [style.height.px]="viewportHeight()"
      >
        <div
          *cdkVirtualFor="let item of filtered(); let i = index"
          class="wr-autocomplete__option"
          role="option"
          [id]="optionId(i)"
          [class.wr-autocomplete__option--active]="i === activeIndex()"
          [attr.aria-selected]="i === activeIndex()"
          [style.height.px]="itemSize()"
          (mouseenter)="activeIndex.set(i)"
          (mousedown)="selectByIndex(i, $event)"
        >
          {{ displayWith()(item) }}
        </div>
      </cdk-virtual-scroll-viewport>
    } @else {
      <ul class="wr-autocomplete__list">
        @for (item of filtered(); track $index; let i = $index) {
          <li
            class="wr-autocomplete__option"
            role="option"
            [id]="optionId(i)"
            [class.wr-autocomplete__option--active]="i === activeIndex()"
            [attr.aria-selected]="i === activeIndex()"
            (mouseenter)="activeIndex.set(i)"
            (mousedown)="selectByIndex(i, $event)"
          >
            {{ displayWith()(item) }}
          </li>
        }
      </ul>
    }
  </div>
</ng-template>
