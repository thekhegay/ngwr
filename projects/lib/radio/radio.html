<label class="wr-radio__label" [for]="id()">
  <input
    class="wr-radio__input"
    type="radio"
    [id]="id()"
    [name]="name()"
    [checked]="checked()"
    [disabled]="disabled()"
    (change)="onSelect()"
    (blur)="onBlur()"
  />

  <span class="wr-radio__dot" aria-hidden="true">
    @if (icon(); as iconName) {
      <wr-icon class="wr-radio__icon" [name]="iconName" />
    }
  </span>

  <span class="wr-radio__text">
    <ng-content />
  </span>
</label>
