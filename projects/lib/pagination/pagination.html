<div class="wr-pagination__inner">
  @if (showTotal()) {
    <span class="wr-pagination__total">{{ rangeLabel() }}</span>
  }

  <div class="wr-pagination__nav">
    <wr-btn
      size="sm"
      outlined
      [attr.aria-label]="resolvedPrev()"
      [disabled]="disabled() || currentPage() === 1"
      (click)="goTo(currentPage() - 1)"
    >
      <svg class="wr-icon__svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" aria-hidden="true">
        <path
          fill="currentColor"
          d="M99.2 57.6h-54l14.4-14.4c2.5-2.5 2.7-6.6.3-9.1-2.5-2.6-6.6-2.7-9.2-.1L25.5 59.1c-2.7 2.7-2.7 7 0 9.7l25 25c2.5 2.5 6.6 2.7 9.1.3 2.6-2.5 2.7-6.6.1-9.2L45.2 70.4h54.3c3.6 0 6.5-3 6.4-6.6-.1-3.5-3.2-6.2-6.7-6.2"
        />
      </svg>
    </wr-btn>

    @for (page of pages(); track $index) {
      @if (page === ellipsis) {
        <span class="wr-pagination__ellipsis">{{ ellipsis }}</span>
      } @else {
        <wr-btn
          size="sm"
          [outlined]="!isCurrent(page)"
          [color]="isCurrent(page) ? 'primary' : null"
          [attr.aria-current]="isCurrent(page) ? 'page' : null"
          [attr.aria-label]="'Go to page ' + page"
          [disabled]="disabled()"
          (click)="goTo(page)"
        >
          {{ page }}
        </wr-btn>
      }
    }

    <wr-btn
      size="sm"
      outlined
      [attr.aria-label]="resolvedNext()"
      [disabled]="disabled() || currentPage() === totalPages()"
      (click)="goTo(currentPage() + 1)"
    >
      <svg class="wr-icon__svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" aria-hidden="true">
        <path
          fill="currentColor"
          d="M30.2 70.3h54L69.8 84.7c-2.5 2.5-2.7 6.6-.3 9.1 2.5 2.6 6.6 2.7 9.2.1l25.2-25.2c2.7-2.7 2.7-7 0-9.7l-25-25c-2.5-2.5-6.6-2.7-9.1-.3-2.6 2.5-2.7 6.6-.1 9.2l14.6 14.6H29.9c-3.6 0-6.5 3-6.4 6.6.1 3.5 3.2 6.2 6.7 6.2"
        />
      </svg>
    </wr-btn>
  </div>

  @if (showSizeChanger()) {
    <wr-select
      class="wr-pagination__size"
      [attr.aria-label]="resolvedItemsPerPage()"
      [disabled]="disabled()"
      [ngModel]="pageSize()"
      (ngModelChange)="onSizeChange($event)"
    >
      @for (option of pageSizeOptions(); track option) {
        <wr-option [value]="option">{{ option }} / page</wr-option>
      }
    </wr-select>
  }
</div>
