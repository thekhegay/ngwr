<div class="wr-pagination__inner">
  @if (showTotal()) {
    <span class="wr-pagination__total">{{ rangeLabel() }}</span>
  }

  <div class="wr-pagination__nav">
    <wr-btn
      [size]="size()"
      outlined
      [attr.aria-label]="resolvedPrev()"
      [disabled]="disabled() || currentPage() === 1"
      (click)="goTo(currentPage() - 1)"
    >
      <svg
        class="wr-icon__svg"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="m12 19-7-7 7-7" />
        <path d="M19 12H5" />
      </svg>
    </wr-btn>

    @for (page of pages(); track $index) {
      @if (page === ellipsis) {
        <span class="wr-pagination__ellipsis">{{ ellipsis }}</span>
      } @else {
        <wr-btn
          class="wr-pagination__page"
          [size]="size()"
          [outlined]="!isCurrent(page)"
          [color]="isCurrent(page) ? 'primary' : null"
          [attr.aria-current]="isCurrent(page) ? 'page' : null"
          [attr.aria-label]="`Go to page ${page}`"
          [disabled]="disabled()"
          (click)="goTo(page)"
        >
          {{ page }}
        </wr-btn>
      }
    }

    <!-- Compact pager — shown only in responsive mode on a narrow box (CSS). -->
    <span class="wr-pagination__current" aria-hidden="true">{{ currentPage() }} / {{ totalPages() }}</span>

    <wr-btn
      [size]="size()"
      outlined
      [attr.aria-label]="resolvedNext()"
      [disabled]="disabled() || currentPage() === totalPages()"
      (click)="goTo(currentPage() + 1)"
    >
      <svg
        class="wr-icon__svg"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M5 12h14" />
        <path d="m12 5 7 7-7 7" />
      </svg>
    </wr-btn>
  </div>

  @if (showSizeChanger()) {
    <wr-select
      class="wr-pagination__size"
      [attr.aria-label]="resolvedItemsPerPage()"
      [disabled]="disabled()"
      [ngModel]="pageSize()"
      (ngModelChange)="onSizeChange($event)"
    >
      @for (option of pageSizeOptions(); track option) {
        <wr-option [value]="option">{{ option }} / page</wr-option>
      }
    </wr-select>
  }
</div>
