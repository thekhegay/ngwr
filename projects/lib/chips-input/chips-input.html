<div class="wr-chips-input__chips">
  @for (chip of chips(); track $index; let i = $index) {
    <span class="wr-chips-input__chip">
      <span class="wr-chips-input__chip-label">{{ chip }}</span>
      <button
        type="button"
        class="wr-chips-input__chip-remove"
        tabindex="-1"
        [attr.aria-label]="'Remove ' + chip"
        [disabled]="effectiveDisabled()"
        (click)="removeAt(i); $event.stopPropagation()"
      >
        ×
      </button>
    </span>
  }
  <input
    #input
    class="wr-chips-input__input"
    type="text"
    autocomplete="off"
    spellcheck="false"
    [placeholder]="chips().length === 0 ? placeholder() : ''"
    [disabled]="effectiveDisabled() || atCapacity()"
    [value]="draft()"
    (input)="onInput($event)"
    (keydown)="onKeydown($event)"
    (paste)="onPaste($event)"
    (blur)="onBlur()"
  />
</div>
