<svg [attr.viewBox]="viewBox" [style.width]="width()" [style.height]="height()" preserveAspectRatio="none">
  @if (showArea() && areaPath()) {
    <path class="wr-sparkline__area" [attr.d]="areaPath()" [attr.fill]="color()" fill-opacity="0.15" stroke="none" />
  }
  @if (linePath()) {
    <path
      class="wr-sparkline__line"
      [attr.d]="linePath()"
      fill="none"
      [attr.stroke]="color()"
      [attr.stroke-width]="strokeWidth()"
      stroke-linecap="round"
      stroke-linejoin="round"
      vector-effect="non-scaling-stroke"
    />
  }
  @if (showTip() && tipPoint(); as tip) {
    <circle class="wr-sparkline__tip" [attr.cx]="tip.x" [attr.cy]="tip.y" r="1.5" [attr.fill]="color()" />
  }
</svg>
