<button type="button" class="wr-table-filter__trigger" [wrDropdown]="menu" aria-label="Filter column">
  <svg
    class="wr-icon__svg"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    aria-hidden="true"
  >
    <path
      d="M10 20a1 1 0 0 0 .553.895l2 1A1 1 0 0 0 14 21v-7a2 2 0 0 1 .517-1.341L21.74 4.67A1 1 0 0 0 21 3H3a1 1 0 0 0-.742 1.67l7.225 7.989A2 2 0 0 1 10 14z"
    />
  </svg>
  @if (selectedCount() > 0) {
    <span class="wr-table-filter__count">{{ selectedCount() }}</span>
  }
</button>

<wr-dropdown-menu #menu>
  <div class="wr-table-filter__panel">
    <input
      class="wr-table-filter__search"
      type="search"
      placeholder="Search"
      [value]="query()"
      (input)="onSearchInput($event)"
    />

    <div class="wr-table-filter__list">
      @for (item of visible(); track item.value) {
        <button
          type="button"
          class="wr-table-filter__item"
          [class.wr-table-filter__item--selected]="item.selected"
          (click)="onToggle(item)"
        >
          <span class="wr-table-filter__check">
            <svg
              class="wr-icon__svg"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M20 6 9 17l-5-5" />
            </svg>
          </span>
          <span class="wr-table-filter__title">{{ item.title }}</span>
        </button>
      } @empty {
        <div class="wr-table-filter__empty">No matches</div>
      }
    </div>

    @if (selectedCount() > 0) {
      <button type="button" class="wr-table-filter__reset" (click)="onReset()">Reset</button>
    }
  </div>
</wr-dropdown-menu>
