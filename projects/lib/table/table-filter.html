<button type="button" class="wr-table-filter__trigger" [wrDropdown]="menu" aria-label="Filter column">
  <svg class="wr-icon__svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" aria-hidden="true">
    <path
      fill="currentColor"
      d="M128 14.5c0-8-6.5-14.5-14.5-14.5h-99C6.5 0 0 6.5 0 14.5c0 3.9 1.6 7.7 4.4 10.4l39 38v44.9c0 2.9 1.7 5.6 4.3 6.9l25.8 12.5c5.1 2.5 11-1.2 11-6.9V62.9l39-38c2.9-2.8 4.5-6.5 4.5-10.4"
    />
  </svg>
  @if (selectedCount() > 0) {
    <span class="wr-table-filter__count">{{ selectedCount() }}</span>
  }
</button>

<wr-dropdown-menu #menu>
  <div class="wr-table-filter__panel">
    <input
      class="wr-table-filter__search"
      type="search"
      placeholder="Search"
      [value]="query()"
      (input)="onSearchInput($event)"
    />

    <div class="wr-table-filter__list">
      @for (item of visible(); track item.value) {
        <button
          type="button"
          class="wr-table-filter__item"
          [class.wr-table-filter__item--selected]="item.selected"
          (click)="onToggle(item)"
        >
          <span class="wr-table-filter__check">
            <svg class="wr-icon__svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" aria-hidden="true">
              <path
                fill="currentColor"
                d="M124.1 21.3c5.2 5.2 5.2 13.7 0 18.9L72.7 91.7l-18.9 18.9-19-18.9-30.9-31c-5.2-5.2-5.2-13.7 0-18.9s13.7-5.2 18.9 0l30.9 30.9 51.4-51.4c5.3-5.2 13.8-5.2 19 0"
              />
            </svg>
          </span>
          <span class="wr-table-filter__title">{{ item.title }}</span>
        </button>
      } @empty {
        <div class="wr-table-filter__empty">No matches</div>
      }
    </div>

    @if (selectedCount() > 0) {
      <button type="button" class="wr-table-filter__reset" (click)="onReset()">Reset</button>
    }
  </div>
</wr-dropdown-menu>
