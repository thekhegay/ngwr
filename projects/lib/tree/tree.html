@if (isOverlay()) {
  <button
    type="button"
    class="wr-tree__trigger"
    role="combobox"
    [disabled]="isDisabled()"
    [attr.aria-haspopup]="'tree'"
    [attr.aria-expanded]="open()"
    [attr.aria-controls]="panelId"
    [attr.aria-multiselectable]="isMulti() ? 'true' : null"
    (click)="onTriggerClick()"
    (blur)="onTouched()"
  >
    @if (isMulti()) {
      @if (hasSelection()) {
        <span class="wr-tree__chips">
          @for (chip of visibleChips(); track chip.id) {
            <span class="wr-tree__chip">
              <span class="wr-tree__chip-label">{{ chip.label }}</span>
              <span
                class="wr-tree__chip-remove"
                role="button"
                [attr.aria-label]="chipRemoveLabel({ label: chip.label })"
                tabindex="-1"
                (click)="removeChip(chip.id, $event)"
                (keydown.enter)="removeChip(chip.id, $event)"
                (keydown.space)="removeChip(chip.id, $event)"
              >
                <wr-icon name="close" />
              </span>
            </span>
          }
          @if (hiddenChipCount(); as extra) {
            <span class="wr-tree__chip wr-tree__chip--more">+{{ extra }} more</span>
          }
        </span>
      } @else {
        <span class="wr-tree__placeholder">{{ placeholder() }}</span>
      }
    } @else {
      @if (singleLabel(); as label) {
        <span class="wr-tree__value">{{ label }}</span>
      } @else {
        <span class="wr-tree__placeholder">{{ placeholder() }}</span>
      }
    }

    @if (clearable() && hasSelection() && !isDisabled()) {
      <span
        class="wr-tree__clear"
        role="button"
        [attr.aria-label]="clearLabel"
        tabindex="-1"
        (click)="clearSelection($event)"
        (keydown.enter)="clearSelection($event)"
        (keydown.space)="clearSelection($event)"
      >
        <wr-icon name="close" />
      </span>
    }

    <wr-icon class="wr-tree__chevron" name="chevron-down" />
  </button>

  <!-- Tree list lives inside the overlay panel. -->
  <ng-template #panelTpl>
    <div class="wr-tree-panel" [attr.id]="panelId">
      <ng-container [ngTemplateOutlet]="listTpl" />
    </div>
  </ng-template>
} @else {
  <ng-container [ngTemplateOutlet]="listTpl" />
}

<!-- Shared row list — rendered inline (default) or projected into the
     overlay panel (when openOn="overlay"). -->
<ng-template #listTpl>
  <!-- Roving tabindex: the tree owns keyboard focus and routes arrow keys
       to its currently-focused row. -->
  <!-- eslint-disable-next-line @angular-eslint/template/interactive-supports-focus -->
  <ul class="wr-tree__list" role="tree" (keydown)="onKeydown($event)">
    @for (entry of flat(); track entry.node.id; let i = $index) {
      <!-- Click handler lives on focusable rows; keyboard handling is owned
           by the parent <ul> via the roving-tabindex pattern. -->
      <!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events -->
      <li
        class="wr-tree__row"
        role="treeitem"
        [class.wr-tree__row--selected]="selectedSet().has(entry.node.id)"
        [class.wr-tree__row--disabled]="entry.node.disabled"
        [attr.aria-level]="entry.depth + 1"
        [attr.aria-expanded]="entry.hasChildren ? expandedSet().has(entry.node.id) : null"
        [attr.aria-selected]="selectionMode() === 'none' ? null : selectedSet().has(entry.node.id)"
        [attr.aria-disabled]="entry.node.disabled || isDisabled() || null"
        [attr.data-tree-index]="i"
        [attr.tabindex]="i === focusedIndex() ? 0 : -1"
        [style.--wr-tree-depth]="entry.depth"
        (click)="onRowClick(entry, $event)"
      >
        @if (entry.hasChildren) {
          <button
            type="button"
            class="wr-tree__toggle"
            tabindex="-1"
            [attr.aria-label]="expandedSet().has(entry.node.id) ? collapseLabel : expandLabel"
            (click)="onToggleClick(entry.node, $event)"
          >
            <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
              <path d="M3 1 L7 5 L3 9 Z" fill="currentColor" />
            </svg>
          </button>
        } @else {
          <span class="wr-tree__toggle wr-tree__toggle--leaf" aria-hidden="true"></span>
        }
        <span class="wr-tree__label">{{ entry.node.label }}</span>
      </li>
    }
  </ul>
</ng-template>
