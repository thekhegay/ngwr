@if (isLink()) {
  @if (isRouter()) {
    <a class="wr-breadcrumb__link" [routerLink]="routerLink()">
      <ng-content />
    </a>
  } @else {
    <a
      class="wr-breadcrumb__link"
      [href]="href()"
      [attr.target]="external() ? '_blank' : null"
      [attr.rel]="external() ? 'noreferrer noopener' : null"
    >
      <ng-content />
    </a>
  }
} @else {
  <span class="wr-breadcrumb__current" aria-current="page">
    <ng-content />
  </span>
}
