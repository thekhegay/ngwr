<form class="wr-auth__form" (submit)="onSubmit($event)">
  <header class="wr-auth__header">
    <h1 class="wr-auth__title">{{ title() }}</h1>
    @if (subtitle()) {
      <p class="wr-auth__subtitle">{{ subtitle() }}</p>
    }
    <ng-content select="[wrAuthHeader]" />
  </header>

  <div class="wr-auth__field">
    <label class="wr-auth__label" for="wr-auth-login-email">Email</label>
    <input
      id="wr-auth-login-email"
      wrInput
      type="email"
      autocomplete="email"
      required
      [ngModel]="email()"
      (ngModelChange)="email.set($event)"
      name="email"
    />
  </div>

  <div class="wr-auth__field">
    <label class="wr-auth__label" for="wr-auth-login-password">Password</label>
    <wr-input-group>
      <input
        id="wr-auth-login-password"
        wrInput
        type="password"
        autocomplete="current-password"
        required
        #pw
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        name="password"
      />
      <wr-password-toggle [for]="pw" />
    </wr-input-group>
  </div>

  <label class="wr-auth__remember">
    <input type="checkbox" [checked]="remember()" (change)="remember.set(!!$any($event.target).checked)" />
    Remember me
  </label>

  @if (errorMessage()) {
    <div class="wr-auth__error" role="alert">{{ errorMessage() }}</div>
  }

  <button type="submit" class="wr-auth__submit" [disabled]="loading()">
    {{ loading() ? 'Signing in…' : submitText() }}
  </button>

  <ng-content select="[wrAuthSocial]" />

  <footer class="wr-auth__footer">
    <ng-content select="[wrAuthFooter]" />
  </footer>
</form>
