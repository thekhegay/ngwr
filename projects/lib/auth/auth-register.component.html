<form class="wr-auth__form" (submit)="onSubmit($event)">
  <header class="wr-auth__header">
    <h1 class="wr-auth__title">{{ title() }}</h1>
    @if (subtitle()) {
      <p class="wr-auth__subtitle">{{ subtitle() }}</p>
    }
    <ng-content select="[wrAuthHeader]" />
  </header>

  <div class="wr-auth__field">
    <label class="wr-auth__label" for="wr-auth-register-name">Name</label>
    <input
      id="wr-auth-register-name"
      wrInput
      type="text"
      autocomplete="name"
      required
      [ngModel]="name()"
      (ngModelChange)="name.set($event)"
      name="name"
    />
  </div>

  <div class="wr-auth__field">
    <label class="wr-auth__label" for="wr-auth-register-email">Email</label>
    <input
      id="wr-auth-register-email"
      wrInput
      type="email"
      autocomplete="email"
      required
      [ngModel]="email()"
      (ngModelChange)="email.set($event)"
      name="email"
    />
  </div>

  <div class="wr-auth__field">
    <label class="wr-auth__label" for="wr-auth-register-password">Password</label>
    <wr-input-group>
      <input
        id="wr-auth-register-password"
        wrInput
        type="password"
        autocomplete="new-password"
        required
        #pw
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        name="password"
      />
      <wr-password-toggle [for]="pw" />
    </wr-input-group>
  </div>

  <div class="wr-auth__field">
    <label class="wr-auth__label" for="wr-auth-register-confirm">Confirm password</label>
    <wr-input-group>
      <input
        id="wr-auth-register-confirm"
        wrInput
        type="password"
        autocomplete="new-password"
        required
        #pwc
        [ngModel]="confirm()"
        (ngModelChange)="confirm.set($event)"
        name="confirm"
      />
      <wr-password-toggle [for]="pwc" />
    </wr-input-group>
    @if (mismatch()) {
      <small class="wr-auth__hint wr-auth__hint--error">Passwords don't match.</small>
    }
  </div>

  @if (errorMessage()) {
    <div class="wr-auth__error" role="alert">{{ errorMessage() }}</div>
  }

  <button type="submit" class="wr-auth__submit" [disabled]="loading() || mismatch()">
    {{ loading() ? 'Creating account…' : submitText() }}
  </button>

  <footer class="wr-auth__footer">
    <ng-content select="[wrAuthFooter]" />
  </footer>
</form>
