@if (items().length === 0) {
  <div class="wr-mention-panel__empty">No matches</div>
} @else {
  <ul class="wr-mention-panel__list" role="listbox">
    @for (item of items(); track $index; let i = $index) {
      <li
        class="wr-mention-panel__option"
        role="option"
        [class.wr-mention-panel__option--active]="i === activeIndex()"
        [attr.aria-selected]="i === activeIndex()"
        (mouseenter)="hovered.emit(i)"
        (mousedown)="onPick(item, $event)"
      >
        {{ displayWith()(item) }}
      </li>
    }
  </ul>
}
