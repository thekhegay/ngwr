<div
  class="wr-compare__surface"
  role="slider"
  aria-label="Comparison divider"
  [attr.aria-orientation]="orientation()"
  [attr.aria-valuemin]="minPosition()"
  [attr.aria-valuemax]="maxPosition()"
  [attr.aria-valuenow]="position()"
  [attr.aria-disabled]="disabled() || null"
  [attr.tabindex]="disabled() ? -1 : 0"
  (pointerdown)="onPointerDown($event)"
  (pointermove)="onPointerMove($event)"
  (pointerup)="onPointerUp($event)"
  (pointercancel)="onPointerUp($event)"
  (keydown)="onKeydown($event)"
>
  <div class="wr-compare__layers">
    <div class="wr-compare__layer wr-compare__layer--before">
      <ng-content select="[wrCompareBefore]" />
    </div>
    <div class="wr-compare__layer wr-compare__layer--after" [style.clip-path]="clipPath()">
      <ng-content select="[wrCompareAfter]" />
    </div>
  </div>

  <div
    class="wr-compare__divider"
    [style.left.%]="orientation() === 'horizontal' ? position() : null"
    [style.top.%]="orientation() === 'vertical' ? position() : null"
    aria-hidden="true"
  >
    @if (showHandle()) {
      <span class="wr-compare__handle">
        @if (orientation() === 'horizontal') {
          <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
            <path
              d="M5 4 L1 8 L5 12 M11 4 L15 8 L11 12"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        } @else {
          <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
            <path
              d="M4 5 L8 1 L12 5 M4 11 L8 15 L12 11"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        }
      </span>
    }
  </div>
</div>
