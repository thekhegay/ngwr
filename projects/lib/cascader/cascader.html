<button
  type="button"
  class="wr-cascader__trigger"
  role="combobox"
  [disabled]="isDisabled()"
  [attr.aria-haspopup]="'menu'"
  [attr.aria-expanded]="open()"
  [attr.aria-controls]="panelId"
  (click)="onTriggerClick()"
  (blur)="onTouched()"
>
  @if (displayLabel(); as label) {
    <span class="wr-cascader__value">{{ label }}</span>
  } @else {
    <span class="wr-cascader__placeholder">{{ placeholder() }}</span>
  }

  @if (clearable() && hasSelection() && !isDisabled()) {
    <span
      class="wr-cascader__clear"
      role="button"
      aria-label="Clear selection"
      tabindex="-1"
      (click)="clearSelection($event)"
      (keydown.enter)="clearSelection($event)"
      (keydown.space)="clearSelection($event)"
    >
      <svg class="wr-icon__svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" aria-hidden="true">
        <path
          fill="currentColor"
          d="M73 64.1 93.2 44c2.5-2.5 2.5-6.6 0-9.1s-6.6-2.5-9.1 0L64 55.1 43.8 34.9c-2.5-2.5-6.6-2.5-9.1 0s-2.5 6.6 0 9.1l20.2 20.2-20.1 20c-2.5 2.5-2.5 6.6 0 9.1s6.6 2.5 9.1 0L64 73.2l20 20.1c2.5 2.5 6.6 2.5 9.1 0s2.5-6.6 0-9.1z"
        />
      </svg>
    </span>
  }

  <svg
    class="wr-icon__svg wr-cascader__chevron"
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 512 512"
    aria-hidden="true"
  >
    <path
      fill="none"
      stroke="currentColor"
      stroke-linecap="square"
      stroke-miterlimit="10"
      stroke-width="48"
      d="m112 184 144 144 144-144"
    />
  </svg>
</button>

<ng-template #panelTpl>
  <div class="wr-cascader-panel" role="menu" [attr.id]="panelId">
    @for (col of columns(); track $index; let colIndex = $index) {
      <ul class="wr-cascader__col" role="menu">
        @for (opt of col; track opt.value) {
          <li
            class="wr-cascader__opt"
            role="menuitem"
            [class.wr-cascader__opt--active]="isActiveAt(colIndex, opt.value)"
            [class.wr-cascader__opt--disabled]="opt.disabled"
            [attr.tabindex]="opt.disabled ? -1 : 0"
            [attr.aria-disabled]="opt.disabled ? true : null"
            (click)="onOptionClick(colIndex, opt, $event)"
            (keydown.enter)="onOptionClick(colIndex, opt, $event)"
            (keydown.space)="onOptionClick(colIndex, opt, $event)"
          >
            <span class="wr-cascader__opt-label">{{ opt.label }}</span>
            @if (opt.children?.length) {
              <svg
                class="wr-icon__svg wr-cascader__opt-arrow"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 512 512"
                aria-hidden="true"
              >
                <path
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="square"
                  stroke-miterlimit="10"
                  stroke-width="48"
                  d="m184 112 144 144-144 144"
                />
              </svg>
            }
          </li>
        }
      </ul>
    }
  </div>
</ng-template>
