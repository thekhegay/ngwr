@if (disablePreview()) {
  <img
    class="wr-lightbox__thumb"
    [src]="preview() || src()"
    [alt]="alt()"
    (load)="onLoad()"
    loading="lazy"
    decoding="async"
  />
} @else {
  <button type="button" class="wr-lightbox__trigger" [attr.aria-label]="alt() || 'Open preview'" (click)="onClick()">
    <img
      class="wr-lightbox__thumb"
      [src]="preview() || src()"
      [alt]="alt()"
      (load)="onLoad()"
      loading="lazy"
      decoding="async"
    />
  </button>
}

<ng-template #viewerTpl>
  <div class="wr-lightbox-viewer" role="dialog" aria-modal="true" [attr.aria-label]="alt() || 'Image preview'">
    <button
      type="button"
      class="wr-lightbox-viewer__close"
      aria-label="Close preview"
      (click)="onClose()"
      (keydown.enter)="onClose()"
      (keydown.space)="onClose()"
    >
      <svg
        class="wr-icon__svg"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M18 6 6 18" />
        <path d="m6 6 12 12" />
      </svg>
    </button>
    <img class="wr-lightbox-viewer__full" [src]="src()" [alt]="alt()" />
    @if (caption()) {
      <div class="wr-lightbox-viewer__caption">{{ caption() }}</div>
    }
  </div>
</ng-template>
