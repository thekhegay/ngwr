<button
  type="button"
  class="wr-speed-dial__trigger"
  [attr.aria-expanded]="open()"
  aria-haspopup="menu"
  [disabled]="disabled()"
  (click)="onTrigger()"
>
  <wr-icon [name]="icon()" />
</button>

<ul class="wr-speed-dial__actions" role="menu">
  @for (action of actions(); track action.id) {
    <li class="wr-speed-dial__action-wrap" [style.--wr-speed-dial-i]="$index + 1">
      <button
        type="button"
        class="wr-speed-dial__action"
        role="menuitem"
        [attr.aria-label]="action.label"
        [title]="action.label"
        (click)="onPick(action)"
      >
        @if (action.icon) {
          <wr-icon [name]="action.icon" />
        } @else {
          <span>{{ action.label.charAt(0) }}</span>
        }
      </button>
    </li>
  }
</ul>
