@if (disablePreview()) {
  <img
    class="wr-image__thumb"
    [src]="preview() || src()"
    [alt]="alt()"
    (load)="onLoad()"
    loading="lazy"
    decoding="async"
  />
} @else {
  <button type="button" class="wr-image__trigger" [attr.aria-label]="alt() || 'Open preview'" (click)="onClick()">
    <img
      class="wr-image__thumb"
      [src]="preview() || src()"
      [alt]="alt()"
      (load)="onLoad()"
      loading="lazy"
      decoding="async"
    />
  </button>
}

<ng-template>
  <div class="wr-image-viewer" role="dialog" aria-modal="true" [attr.aria-label]="alt() || 'Image preview'">
    <button
      type="button"
      class="wr-image-viewer__close"
      aria-label="Close preview"
      (click)="onClose()"
      (keydown.enter)="onClose()"
      (keydown.space)="onClose()"
    >
      <svg class="wr-icon__svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" aria-hidden="true">
        <path
          fill="currentColor"
          d="M73 64.1 93.2 44c2.5-2.5 2.5-6.6 0-9.1s-6.6-2.5-9.1 0L64 55.1 43.8 34.9c-2.5-2.5-6.6-2.5-9.1 0s-2.5 6.6 0 9.1l20.2 20.2-20.1 20c-2.5 2.5-2.5 6.6 0 9.1s6.6 2.5 9.1 0L64 73.2l20 20.1c2.5 2.5 6.6 2.5 9.1 0s2.5-6.6 0-9.1z"
        />
      </svg>
    </button>
    <img class="wr-image-viewer__full" [src]="src()" [alt]="alt()" />
    @if (caption()) {
      <div class="wr-image-viewer__caption">{{ caption() }}</div>
    }
  </div>
</ng-template>
