@if (title() || subtitle()) {
  <header class="wr-block-features__header">
    @if (title()) {
      <h2 class="wr-block-features__title">{{ title() }}</h2>
    }
    @if (subtitle()) {
      <p class="wr-block-features__subtitle">{{ subtitle() }}</p>
    }
  </header>
}

<div class="wr-block-features__grid" [style.grid-template-columns]="columnsStyle()">
  @for (feature of features(); track feature.title) {
    <div class="wr-block-features__item">
      @if (feature.icon) {
        <div class="wr-block-features__icon">
          <wr-icon [name]="feature.icon" />
        </div>
      }
      <h3 class="wr-block-features__item-title">{{ feature.title }}</h3>
      @if (feature.description) {
        <p class="wr-block-features__item-description">{{ feature.description }}</p>
      }
    </div>
  }
</div>
