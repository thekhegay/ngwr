<div class="wr-block-hero__copy">
  <div class="wr-block-hero__badge"><ng-content select="[wrHeroBadge]" /></div>
  @if (title()) {
    <h1 class="wr-block-hero__title">{{ title() }}</h1>
  }
  @if (subtitle()) {
    <p class="wr-block-hero__subtitle">{{ subtitle() }}</p>
  }
  <div class="wr-block-hero__actions"><ng-content select="[wrHeroActions]" /></div>
</div>
<div class="wr-block-hero__media"><ng-content select="[wrHeroMedia]" /></div>
