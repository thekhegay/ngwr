<div class="wr-block-not-found__code">{{ code() }}</div>
@if (title()) {
  <h1 class="wr-block-not-found__title">{{ title() }}</h1>
}
@if (subtitle()) {
  <p class="wr-block-not-found__subtitle">{{ subtitle() }}</p>
}
<div class="wr-block-not-found__actions">
  <ng-content select="[wrNotFoundActions]" />
</div>
