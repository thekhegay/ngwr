<wr-input-group>
  <input
    #input
    wrInput
    type="text"
    autocomplete="off"
    spellcheck="false"
    [value]="text()"
    [placeholder]="placeholder()"
    [disabled]="effectiveDisabled()"
    [readonly]="readonly()"
    (click)="openOnInput()"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
  <button
    type="button"
    wrInputSuffix
    class="wr-date-time-picker__trigger"
    aria-label="Open date and time picker"
    [disabled]="effectiveDisabled()"
    (click)="toggleOverlay()"
  >
    <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
      <rect x="1.5" y="2.5" width="11" height="10" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.2" />
      <line x1="1.5" y1="5.5" x2="12.5" y2="5.5" stroke="currentColor" stroke-width="1.2" />
      <line x1="4" y1="1" x2="4" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
      <line x1="10" y1="1" x2="10" y2="4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
      <circle cx="7" cy="9" r="1.5" fill="currentColor" />
    </svg>
  </button>
</wr-input-group>
