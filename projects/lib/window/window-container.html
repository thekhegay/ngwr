<wr-window
  [open]="true"
  [title]="ref.title()"
  [os]="config.os ?? 'windows'"
  [size]="config.size ?? 'md'"
  [chromeSize]="config.chromeSize ?? 'normal'"
  [animations]="config.animations ?? true"
  [initialX]="config.x ?? null"
  [initialY]="config.y ?? null"
  [initialWidth]="config.width ?? null"
  [initialHeight]="config.height ?? null"
  [minWidth]="config.minWidth ?? 220"
  [minHeight]="config.minHeight ?? 140"
  [maxWidth]="config.maxWidth ?? 1000000"
  [maxHeight]="config.maxHeight ?? 1000000"
  [movable]="config.movable ?? true"
  [resizable]="config.resizable ?? true"
  [keepInViewport]="config.keepInViewport ?? true"
  [snap]="config.snap ?? 'none'"
  [dragHandle]="config.dragHandle ?? null"
  [showMinimize]="config.showMinimize ?? true"
  [showMaximize]="config.showMaximize ?? true"
  [showClose]="config.showClose ?? true"
  (closed)="ref.close()"
  #window
>
  <ng-container #content />
</wr-window>

@if (window.snapTarget(); as target) {
  <div class="wr-window__snap-hint" [attr.data-target]="target" aria-hidden="true"></div>
}
