version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      time: '13:00'
      timezone: 'Asia/Almaty'
    open-pull-requests-limit: 10
    assignees:
      - 'thekhegay'
    labels:
      - 'dependencies'
      - 'type: chore'
    groups:
      angular:
        patterns:
          - '@angular/*'
          - '@angular-eslint/*'
          - 'angular-eslint'
          - 'ng-packagr'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'prettier'
          - 'prettier-*'
      types:
        patterns:
          - '@types/*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      time: '13:00'
      timezone: 'Asia/Almaty'
    assignees:
      - 'thekhegay'
    labels:
      - 'dependencies'
      - 'github-actions'
      - 'type: chore'
