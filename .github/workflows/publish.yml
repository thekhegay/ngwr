name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # tag + create release
  id-token: write   # npm publish via Trusted Publisher OIDC

jobs:
  detect:
    name: Detect release commit
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
      is_rc: ${{ steps.check.outputs.is_rc }}
    steps:
      - uses: actions/checkout@v6

      - id: check
        name: Inspect head commit
        run: |
          subject=$(git log -1 --pretty=%s)
          echo "Head subject: $subject"
          # Optional trailing " (#123)" — GitHub appends the PR number on squash merge.
          if [[ "$subject" =~ ^chore\(release\):\ v([0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?)(\ \(#[0-9]+\))?$ ]]; then
            version="${BASH_REMATCH[1]}"
            tag="v$version"
            is_rc=$([[ "$version" == *-rc.* ]] && echo true || echo false)
            echo "is_release=true"  >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=$tag"         >> "$GITHUB_OUTPUT"
            echo "is_rc=$is_rc"     >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Tag, release & npm publish
    needs: detect
    if: needs.detect.outputs.is_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:lib

      - name: Generate release body
        run: pnpm release:body --output=.release-body.md

      - name: Create git tag
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "${{ needs.detect.outputs.tag }}" -m "Release ${{ needs.detect.outputs.tag }}"
          git push origin "${{ needs.detect.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.detect.outputs.tag }}
          name: Release ${{ needs.detect.outputs.tag }}
          body_path: .release-body.md
          prerelease: ${{ needs.detect.outputs.is_rc == 'true' }}
          make_latest: ${{ needs.detect.outputs.is_rc == 'false' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure npm CLI supports Trusted Publishing
        # OIDC support landed in npm 11.5.1.
        run: npm install -g npm@latest

      - name: Publish to npm (Trusted Publisher)
        run: |
          tag=$([[ "${{ needs.detect.outputs.is_rc }}" == "true" ]] && echo "next" || echo "latest")
          npm publish dist/lib --access public --provenance --tag "$tag"
