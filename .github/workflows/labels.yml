name: Labels sync

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
      - '.github/workflows/labels.yml'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Preview changes without applying them'
        type: boolean
        default: false
      delete-other-labels:
        description: 'Delete labels not present in labels.yml'
        type: boolean
        default: true

permissions:
  issues: write

jobs:
  sync:
    name: Sync labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          dry-run: ${{ inputs.dry-run || false }}
          delete-other-labels: ${{ inputs.delete-other-labels == null && true || inputs.delete-other-labels }}
