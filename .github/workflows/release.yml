name: Release PR

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - rc

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    name: Cut release PR
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch / bump combination
        run: |
          ref="${{ github.ref_name }}"
          bump="${{ inputs.bump }}"
          if [ "$bump" = "rc" ] && [ "$ref" != "next" ]; then
            echo "❌ rc releases must be cut from the 'next' branch (current: $ref)" >&2
            exit 1
          fi
          if [ "$bump" != "rc" ] && [ "$ref" != "main" ]; then
            echo "❌ $bump releases must be cut from 'main' (current: $ref)" >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Bump version and update CHANGELOG
        id: prepare
        run: pnpm release:prepare --bump=${{ inputs.bump }} > /dev/null

      - name: Generate release body
        run: pnpm release:body --output=.release-body.md

      - name: Create release PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/v${{ steps.prepare.outputs.version }}
          base: ${{ github.ref_name }}
          delete-branch: true
          commit-message: 'chore(release): v${{ steps.prepare.outputs.version }}'
          title: 'chore(release): v${{ steps.prepare.outputs.version }}'
          body-path: .release-body.md
          labels: |
            release
            ${{ steps.prepare.outputs.is_rc == 'true' && 'release:rc' || 'release:stable' }}
