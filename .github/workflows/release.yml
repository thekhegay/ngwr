name: Release PR

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (rc publishes to npm dist-tag `next`, everything else to `latest`)'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - rc

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    name: Cut release PR
    runs-on: ubuntu-latest
    # Always cut releases from main — there is no separate release branch.
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.3

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Bump version and update CHANGELOG
        id: prepare
        run: pnpm release:prepare --bump=${{ inputs.bump }} > /dev/null

      - name: Generate release body
        run: pnpm release:body --output=.release-body.md

      - name: Create release PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/v${{ steps.prepare.outputs.version }}
          base: main
          delete-branch: true
          commit-message: 'chore(release): v${{ steps.prepare.outputs.version }}'
          title: 'chore(release): v${{ steps.prepare.outputs.version }}'
          body-path: .release-body.md
          labels: |
            release
            ${{ steps.prepare.outputs.is_rc == 'true' && 'release:rc' || 'release:stable' }}
