name: PR title

on:
  pull_request:
    branches: [main, next]
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  semantic:
    name: Conventional commit
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types and scopes mirror our commit message convention.
          types: |
            feat
            fix
            perf
            refactor
            docs
            style
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.
