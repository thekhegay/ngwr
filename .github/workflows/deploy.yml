name: Deploy showcase

on:
  push:
    branches: [main]

concurrency:
  group: deploy-ngwr-showcase
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy showcase
    # Only on stable releases (skip RCs and non-release commits).
    if: "startsWith(github.event.head_commit.message, 'chore(release): v') && !contains(github.event.head_commit.message, '-rc.')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:showcase

      - uses: easingthemes/ssh-deploy@main
        with:
          SCRIPT_BEFORE: ls
          ARGS: '-rlgoDzvc -i'
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SOURCE: 'dist/showcase/'
          REMOTE_HOST: ${{ secrets.SSH_REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.SSH_REMOTE_USER }}
          TARGET: '/var/www/ngwr-showcase/'
